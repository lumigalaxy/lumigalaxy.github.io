<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* Flame spirit side-bounce walk along screen edge */
  .walk-body {
    transform-origin: 7.5px 5px;
    animation: walk-slide 2.4s infinite ease-in-out;
  }
  .walk-bounce {
    transform-origin: 7.5px 13px;
    animation: walk-bounce 0.4s infinite ease-in-out;
  }
  .ft-walk { transform-origin: 7.5px -1px; animation: ft-walk 0.4s infinite ease-in-out; }
  .arm-l-walk { transform-origin: 1px 5px;  animation: arm-lw 0.4s infinite ease-in-out; }
  .arm-r-walk { transform-origin: 14px 5px; animation: arm-rw 0.4s infinite ease-in-out; }

  @keyframes walk-slide {
    0%,100% { transform: translateX(0) rotate(-12deg); }
    25%     { transform: translateX(-4px) rotate(-14deg); }
    75%     { transform: translateX(4px) rotate(-10deg); }
  }
  @keyframes walk-bounce {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-2px); }
  }
  @keyframes ft-walk {
    0%,100% { transform: rotate(-4deg) scaleY(1.0); }
    50%     { transform: rotate( 5deg) scaleY(1.12); }
  }
  @keyframes arm-lw {
    0%,100% { transform: rotate(15deg); }
    50%     { transform: rotate(-10deg); }
  }
  @keyframes arm-rw {
    0%,100% { transform: rotate(-10deg); }
    50%     { transform: rotate(15deg); }
  }
</style></defs>

<!-- The whole character slides + bounces at the edge -->
<g class="walk-body">
  <g class="walk-bounce">
    <!-- Tips -->
    <g class="ft-walk">
      <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
      <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
      <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
      <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
      <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
      <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
      <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
    </g>

    <rect x="5" y="11" width="1" height="2" fill="#DD3D1E"/>
    <rect x="9" y="11" width="1" height="2" fill="#DD3D1E"/>

    <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
    <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
    <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
    <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
    <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
    <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
    <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
    <!-- Eyes -->
    <rect x="4" y="3" width="2" height="2" fill="#330000"/>
    <rect x="9" y="3" width="2" height="2" fill="#330000"/>
    <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
    <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
    <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    <!-- Arms alternating -->
    <g class="arm-l-walk" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
    <g class="arm-r-walk" fill="#EE4422"><rect x="13" y="5" width="2" height="2"/></g>
  </g>
</g>
</svg>
