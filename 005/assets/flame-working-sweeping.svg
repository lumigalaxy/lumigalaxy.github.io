<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* Body leans and rocks rhythmically while sweeping */
  .body-sweep {
    transform-origin: 7.5px 13px;
    animation: sweep-body 1.4s infinite ease-in-out;
  }
  .shadow-sweep {
    transform-origin: 7.5px 14px;
    animation: sweep-shadow 1.4s infinite ease-in-out;
  }
  /* Sweeping arm: big arc back and forth */
  .arm-sweep {
    transform-origin: 14px 5px;
    animation: arm-sweep 1.4s infinite ease-in-out;
  }
  /* Off-arm: steady */
  .arm-steady {
    transform-origin: 1px 5px;
    animation: arm-steady 1.4s infinite ease-in-out;
  }
  /* Tips: sway with effort */
  .ft-sweep {
    transform-origin: 7.5px -1px;
    animation: ft-sweep 1.4s infinite ease-in-out;
  }
  /* Sparks flying sideways */
  .spark { opacity:0; }
  .sp1 { animation: spark-fly 1.0s  0.0s infinite linear; }
  .sp2 { animation: spark-fly 1.3s -0.5s infinite linear; }
  .sp3 { animation: spark-fly 0.9s -0.8s infinite linear; }

  @keyframes sweep-body {
    0%,100% { transform: rotate(-4deg) translateX(-1px); }
    50%     { transform: rotate( 3deg) translateX( 1px); }
  }
  @keyframes sweep-shadow {
    0%,100% { transform: scaleX(1.0) translateX(-0.5px); opacity:.45; }
    50%     { transform: scaleX(1.0) translateX( 0.5px); opacity:.45; }
  }
  @keyframes arm-sweep {
    0%,100% { transform: rotate(-80deg) translate(-2px,-1px); }
    50%     { transform: rotate(-20deg) translate( 1px, 0px); }
  }
  @keyframes arm-steady {
    0%,100% { transform: rotate(-15deg); }
    50%     { transform: rotate(-5deg); }
  }
  @keyframes ft-sweep {
    0%,100% { transform: rotate(-5deg) scaleY(1.05); }
    50%     { transform: rotate( 4deg) scaleY(0.95); }
  }
  @keyframes spark-fly {
    0%   { opacity:0; transform:translate(13px,10px) scale(1); }
    15%  { opacity:1; }
    100% { opacity:0; transform:translate(22px, 6px) scale(0.5); }
  }
</style></defs>

<!-- Shadow -->
<rect class="shadow-sweep" x="3" y="14" width="10" height="1" fill="#FF5522" opacity=".45"/>

<!-- Sparks (swept embers flying right) -->
<g fill="#FFD080">
  <rect class="spark sp1" x="0" y="0" width="1" height="1"/>
  <rect class="spark sp2" x="0" y="0" width="1" height="1"/>
  <rect class="spark sp3" x="0" y="0" width="1" height="1"/>
</g>

<!-- Broom / sweep trail (simple static line on the ground) -->
<rect x="5" y="13" width="12" height="1" fill="#CC6622" opacity=".50"/>
<rect x="13" y="12" width="4"  height="1" fill="#DD8833" opacity=".35"/>

<!-- Tips -->
<g class="ft-sweep">
  <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
  <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
  <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
  <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
  <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
</g>

<!-- Body -->
<g class="body-sweep">
  <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
  <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
  <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
  <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
  <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
  <rect x="4"  y="9"  width="7" height="1"  fill="#FF7744"/>
  <rect x="5"  y="10" width="5" height="1"  fill="#FF7744"/>
  <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
  <rect x="5"  y="8"  width="5" height="1"  fill="#FFAA66"/>
  <rect x="6"  y="9"  width="3" height="1"  fill="#FFAA66"/>
  <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
  <!-- Eyes: focused downward at the sweeping -->
  <rect x="4" y="4" width="2" height="1" fill="#330000"/>
  <rect x="9" y="4" width="2" height="1" fill="#330000"/>
  <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
  <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
  <!-- Arms -->
  <g class="arm-steady" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
  <g class="arm-sweep"  fill="#EE4422"><rect x="13" y="5" width="2" height="2"/></g>
</g>
</svg>
