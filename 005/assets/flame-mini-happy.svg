<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* Mini happy: small bounce against the screen edge */
  .bounce-anim {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: mini-bounce 0.9s infinite ease-in-out;
  }
  .arm-l { transform-box:fill-box; transform-origin:100% 50%; animation:wave-l 0.16s infinite alternate ease-in-out; }
  .arm-r { transform-box:fill-box; transform-origin:0% 50%;   animation:wave-r 0.16s infinite alternate ease-in-out; }
  .ft-hap { transform-origin:7.5px -1px; animation:ft-hap 0.3s infinite ease-in-out; }

  @keyframes mini-bounce {
    0%,15%,100% { transform:translateY(0) scaleY(1); }
    20%         { transform:translateY(0) scaleY(0.88); }
    45%         { transform:translateY(-7px) scaleY(1.05); }
    55%         { transform:translateY(-7px) scaleY(1); }
    75%         { transform:translateY(0) scaleY(0.88); }
    82%         { transform:translateY(0) scaleY(1); }
  }
  @keyframes wave-l {
    0%   { transform:rotate(45deg); }
    100% { transform:rotate(80deg); }
  }
  @keyframes wave-r {
    0%   { transform:rotate(-45deg); }
    100% { transform:rotate(-80deg); }
  }
  @keyframes ft-hap {
    0%,100% { transform:rotate(-7deg) scaleY(1.22); }
    50%     { transform:rotate( 7deg) scaleY(1.30); }
  }
</style></defs>

<g transform="rotate(-12, 7.5, 15)">
  <g class="bounce-anim">
    <g class="ft-hap">
      <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
      <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
      <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
      <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
      <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
      <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
      <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
    </g>
    <rect x="5" y="11" width="1" height="2" fill="#DD3D1E"/>
    <rect x="9" y="11" width="1" height="2" fill="#DD3D1E"/>
    <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
    <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
    <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
    <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
    <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
    <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
    <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
    <rect x="4" y="3" width="2" height="2" fill="#330000"/>
    <rect x="9" y="3" width="2" height="2" fill="#330000"/>
    <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".90"/>
    <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".90"/>
    <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".90"/>
    <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".90"/>
    <g class="arm-l" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
    <g class="arm-r" fill="#EE4422"><rect x="13" y="5" width="2" height="2"/></g>
  </g>
</g>
</svg>
