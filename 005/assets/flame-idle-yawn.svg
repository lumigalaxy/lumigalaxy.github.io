<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* One-shot yawn: 3s, ends in sleepy pose */
  .yn-body {
    transform-origin: 7.5px 5px;
    animation: yn-body 3s ease-in-out forwards;
  }
  .yn-tips {
    transform-origin: 7.5px -1px;
    animation: yn-tips 3s ease-in-out forwards;
  }
  .yn-arm-l {
    transform-origin: 1px 5px;
    animation: yn-arm-l 3s ease-in-out forwards;
  }
  .yn-arm-r {
    transform-origin: 14px 5px;
    animation: yn-arm-r 3s ease-in-out forwards;
  }
  .yn-eyes {
    transform-origin: 7.5px 4px;
    animation: yn-eyes 3s linear forwards;
  }
  .yn-mouth {
    transform-origin: 7.5px 7px;
    animation: yn-mouth 3s ease-in-out forwards;
    opacity: 0;
  }
  .yn-shadow {
    transform-origin: 7.5px 14px;
    animation: yn-shadow 3s ease-in-out forwards;
  }

  @keyframes yn-body {
    0%,12%  { transform: scaleX(1)    scaleY(1)    translateY(0px); }
    35%     { transform: scaleX(0.96) scaleY(1.06) translateY(-1.5px); }
    55%     { transform: scaleX(0.93) scaleY(1.10) translateY(-2.5px); }
    80%,100%{ transform: scaleX(1.04) scaleY(0.96) translateY(0.8px); }
  }
  @keyframes yn-tips {
    0%,12%  { transform: rotate(0deg) scaleY(1.0); }
    35%     { transform: rotate(-6deg) scaleY(1.15); }
    55%     { transform: rotate(5deg) scaleY(1.20); }
    80%,100%{ transform: rotate(0deg) scaleY(0.80); }
  }
  @keyframes yn-arm-l {
    0%,12%  { transform: translate(0,0) rotate(0deg); }
    40%     { transform: translate(-1px,-2px) rotate(50deg); }
    55%     { transform: translate(-2px,-3px) rotate(80deg); }
    80%,100%{ transform: translate(0,1px) rotate(-10deg); }
  }
  @keyframes yn-arm-r {
    0%,12%  { transform: translate(0,0) rotate(0deg); }
    40%     { transform: translate(1px,-2px) rotate(-50deg); }
    55%     { transform: translate(2px,-3px) rotate(-80deg); }
    80%,100%{ transform: translate(0,1px) rotate(10deg); }
  }
  @keyframes yn-eyes {
    0%,18%       { transform: scaleY(1); }
    26%          { transform: scaleY(0.1); }
    32%          { transform: scaleY(1); }
    44%,100%     { transform: scaleY(0.1); }
  }
  @keyframes yn-mouth {
    0%,18%  { opacity:0; transform: scale(0.1); }
    34%     { opacity:1; transform: scale(0.5,0.3); }
    55%     { opacity:1; transform: scale(1.1,1.3); }
    72%     { opacity:1; transform: scale(0.5,0.4); }
    82%,100%{ opacity:0; transform: scale(0.1); }
  }
  @keyframes yn-shadow {
    0%,12%  { transform: scaleX(1);    opacity:.45; }
    55%     { transform: scaleX(0.88); opacity:.38; }
    80%,100%{ transform: scaleX(1.05); opacity:.52; }
  }
</style></defs>

<rect class="yn-shadow" x="3" y="14" width="10" height="1" fill="#FF5522" opacity=".45"/>

<!-- Tips -->
<g class="yn-tips">
  <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
  <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
  <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
  <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
  <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
</g>

<!-- Body -->
<g class="yn-body">
  <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
  <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
  <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
  <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
  <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
  <rect x="4"  y="9"  width="7" height="1"  fill="#FF7744"/>
  <rect x="5"  y="10" width="5" height="1"  fill="#FF7744"/>
  <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
  <rect x="5"  y="8"  width="5" height="1"  fill="#FFAA66"/>
  <rect x="6"  y="9"  width="3" height="1"  fill="#FFAA66"/>
  <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
  <!-- Arms -->
  <g class="yn-arm-l"><rect x="0" y="5" width="2" height="2" fill="#EE4422"/></g>
  <g class="yn-arm-r"><rect x="13" y="5" width="2" height="2" fill="#EE4422"/></g>
  <!-- Yawn mouth (hidden, opens during peak) -->
  <rect class="yn-mouth" x="6" y="6" width="3" height="2" fill="#220000"/>
  <!-- Eyes -->
  <g class="yn-eyes" fill="#330000">
    <rect x="4" y="3" width="2" height="2"/>
    <rect x="9" y="3" width="2" height="2"/>
    <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
    <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
  </g>
  <!-- Blush -->
  <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
  <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
</g>
</svg>
