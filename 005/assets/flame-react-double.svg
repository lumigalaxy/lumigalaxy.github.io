<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* Double-click: startled jolt + eye flash */
  .body-anim { transform-origin:7.5px 13px; animation:body-dbl 3.5s infinite ease-in-out; }
  .shadow-anim { transform-origin:7.5px 14px; animation:shadow-dbl 3.5s infinite ease-in-out; }
  .eyes-anim { transform-origin:7.5px 4px; animation:eyes-dbl 3.5s infinite ease-in-out; }
  .arm-l { transform-origin:1px 5px; animation:arm-l-dbl 3.5s infinite ease-in-out; }
  .arm-r { transform-origin:14px 5px; animation:arm-r-dbl 3.5s infinite ease-in-out; }
  .ft-dbl { transform-origin:7.5px -1px; animation:ft-dbl 3.5s infinite ease-in-out; }
  .alert-pop { transform-origin:15px -3px; animation:alert-dbl 3.5s infinite ease-in-out; opacity:0; }

  @keyframes body-dbl {
    0%          { transform: translate(0,0) scale(1,1); }
    3%          { transform: translate(-1.5px,-1px) scale(1.03,0.97); }
    10%         { transform: translate(-1.5px,-1px) scale(1.03,0.97); }
    15%         { transform: translate(0,1.5px) scale(1.05,0.96); }
    20%         { transform: translate(0,-8px) scale(0.96,1.04); }
    25%         { transform: translate(0,1.5px) scale(1.05,0.96); }
    30%         { transform: translate(0,-6px) scale(0.97,1.03); }
    35%         { transform: translate(0,1px) scale(1.03,0.98); }
    40%         { transform: translate(0,-3px) scale(0.99,1.01); }
    45%         { transform: translate(0,0.5px) scale(1.01,0.99); }
    52%,100%    { transform: translate(0,0) scale(1,1); }
  }
  @keyframes shadow-dbl {
    0%,52%,100% { transform: scale(1); opacity:.45; }
    3%,10%      { transform: translate(-1.5px,0) scale(1); opacity:.45; }
    15%         { transform: scale(1.1); opacity:.55; }
    20%         { transform: scale(0.55); opacity:.15; }
    25%         { transform: scale(1.12); opacity:.55; }
    30%         { transform: scale(0.62); opacity:.18; }
    35%         { transform: scale(1.08); opacity:.52; }
    40%         { transform: scale(0.72); opacity:.28; }
    45%         { transform: scale(1.03); opacity:.48; }
  }
  @keyframes eyes-dbl {
    0%          { transform: translate(0,0) scaleY(1); }
    3%          { transform: translate(4px,0) scaleY(0.3); }
    6%          { transform: translate(4px,0) scaleY(1); }
    10%,15%,100%{ transform: translate(0,0) scaleY(1); }
  }
  @keyframes arm-l-dbl {
    0%,52%,100% { transform: rotate(0deg); }
    3%,10%      { transform: rotate(25deg); }
    15%         { transform: rotate(30deg); }
    20%         { transform: rotate(140deg); }
    25%         { transform: rotate(100deg); }
    30%         { transform: rotate(125deg); }
    35%         { transform: rotate(88deg); }
    40%         { transform: rotate(100deg); }
    45%         { transform: rotate(60deg); }
  }
  @keyframes arm-r-dbl {
    0%,52%,100% { transform: rotate(0deg); }
    3%,10%      { transform: rotate(-30deg); }
    15%         { transform: rotate(-30deg); }
    20%         { transform: rotate(-140deg); }
    25%         { transform: rotate(-100deg); }
    30%         { transform: rotate(-125deg); }
    35%         { transform: rotate(-88deg); }
    40%         { transform: rotate(-100deg); }
    45%         { transform: rotate(-60deg); }
  }
  @keyframes ft-dbl {
    0%,52%,100% { transform: rotate(0deg) scaleY(1); }
    3%          { transform: rotate(-5deg) scaleY(1.2); }
    15%,20%     { transform: rotate(5deg) scaleY(1.3); }
    35%         { transform: rotate(-3deg) scaleY(1.1); }
  }
  @keyframes alert-dbl {
    0%          { opacity:0; transform:scale(0.3); }
    3%          { opacity:1; transform:scale(1.3); }
    10%,48%     { opacity:1; transform:scale(1); }
    55%,100%    { opacity:0; transform:scale(0.6); }
  }
</style></defs>

<!-- Mirrored character (faces left) -->
<g transform="translate(15,0) scale(-1,1)">
  <rect class="shadow-anim" x="3" y="14" width="10" height="1" fill="#FF5522"/>

  <g class="body-anim">
    <!-- Tips -->
    <g class="ft-dbl">
      <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
      <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
      <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
      <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
      <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
      <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
      <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
    </g>
    <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
    <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
    <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
    <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
    <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
    <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
    <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
    <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
    <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
    <g class="eyes-anim" fill="#330000">
      <rect x="4" y="3" width="2" height="2"/>
      <rect x="9" y="3" width="2" height="2"/>
      <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
      <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
    </g>
    <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    <g class="arm-l" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
    <g class="arm-r" fill="#EE4422"><rect x="13" y="5" width="2" height="2"/></g>
  </g>
</g>

<!-- Alert flash (screen coords) -->
<g class="alert-pop" fill="#FF4400">
  <rect x="14" y="-8" width="2" height="5"/>
  <rect x="14" y="-2" width="2" height="2"/>
</g>
</svg>
