<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* Body bounce while typing */
  .body-bounce {
    transform-origin: 7.5px 13px;
    animation: body-bounce 0.4s infinite ease-in-out;
  }
  .breathe {
    transform-origin: 7.5px 5px;
    animation: fbrth 3.2s infinite ease-in-out;
  }
  /* Arms alternately peck the keyboard */
  .arm-l-type {
    transform-origin: 1px 5px;
    animation: type-l 0.18s infinite ease-in-out;
  }
  .arm-r-type {
    transform-origin: 14px 5px;
    animation: type-r 0.14s infinite ease-in-out;
  }
  /* Tips: fast flicker while typing */
  .ft-type {
    transform-origin: 7.5px -1px;
    animation: ft-type 0.8s infinite ease-in-out;
  }
  /* Shadow bob */
  .shadow-bob {
    transform-origin: 7.5px 14px;
    animation: shadow-bob 0.4s infinite ease-in-out;
  }
  /* Eyes: focused squint scanning code */
  .eyes-code {
    transform-origin: 7.5px 4px;
    animation: eye-code 8s infinite ease-in-out;
  }
  /* Ember sparks — more active while working */
  .em { opacity:0; }
  .em1 { animation: ferise 1.6s  0.0s  infinite linear; }
  .em2 { animation: ferise 2.0s -0.7s  infinite linear; }
  .em3 { animation: ferise 1.4s -1.2s  infinite linear; }
  .em4 { animation: ferise 1.8s -0.3s  infinite linear; }
  .em5 { animation: ferise 1.5s -0.9s  infinite linear; }
  /* Code line particles */
  .code-line { transform-box: fill-box; transform-origin: left center; }
  .cl1 { animation: cl1 5s infinite; }
  .cl2 { animation: cl2 5s infinite; }
  .cl3 { animation: cl3 5s infinite; }

  @keyframes body-bounce {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(0.7px); }
  }
  @keyframes fbrth {
    0%,100% { transform: scaleX(1.00) scaleY(1.00) translateY(0px); }
    50%     { transform: scaleX(1.02) scaleY(0.98) translateY(0.4px); }
  }
  @keyframes shadow-bob {
    0%,100% { transform: scaleX(1.02); opacity:.45; }
    50%     { transform: scaleX(1.05); opacity:.50; }
  }
  @keyframes type-l {
    0%   { transform: rotate(-8deg); }
    25%  { transform: rotate(-35deg); }
    50%  { transform: rotate(-12deg); }
    75%  { transform: rotate(-30deg); }
    100% { transform: rotate(-8deg); }
  }
  @keyframes type-r {
    0%   { transform: rotate(8deg); }
    25%  { transform: rotate(35deg); }
    50%  { transform: rotate(12deg); }
    75%  { transform: rotate(30deg); }
    100% { transform: rotate(8deg); }
  }
  @keyframes ft-type {
    0%,100% { transform: rotate(0deg) scaleY(1.0); }
    25%     { transform: rotate(-5deg) scaleY(1.12); }
    75%     { transform: rotate(4deg) scaleY(0.90); }
  }
  @keyframes eye-code {
    0%,14%  { transform: translate(0,1px) scaleY(0.5); }
    15%     { transform: translate(0,1px) scaleY(0.1); }
    16%     { transform: translate(0,1px) scaleY(0.5); }
    40%,55% { transform: translate(0,1px) scaleY(0.5); }
    57%     { transform: translate(-1px,-0.5px) scaleY(1); }
    62%     { transform: translate(1.5px,-0.5px) scaleY(1); }
    64%     { transform: translate(0,1px) scaleY(0.5); }
    100%    { transform: translate(0,1px) scaleY(0.5); }
  }
  @keyframes ferise {
    0%   { opacity:0; transform:translate(0px,0px); }
    12%  { opacity:.85; }
    86%  { opacity:.30; }
    100% { opacity:0; transform:translate(1px,-14px); }
  }
  @keyframes cl1 {
    0%        { transform: scaleX(0); opacity:0; }
    3%        { transform: scaleX(0); opacity:1; }
    14%       { transform: scaleX(1); opacity:1; }
    14%,76%   { transform: scaleX(1) translateY(0); opacity:1; }
    86%       { transform: scaleX(1) translateY(-2px); opacity:0; }
    87%,100%  { transform: scaleX(0) translateY(0); opacity:0; }
  }
  @keyframes cl2 {
    0%,18%    { transform: scaleX(0); opacity:0; }
    19%       { transform: scaleX(0); opacity:1; }
    32%       { transform: scaleX(1); opacity:1; }
    32%,80%   { transform: scaleX(1) translateY(0); opacity:1; }
    89%       { transform: scaleX(1) translateY(-2px); opacity:0; }
    90%,100%  { transform: scaleX(0) translateY(0); opacity:0; }
  }
  @keyframes cl3 {
    0%,36%    { transform: scaleX(0); opacity:0; }
    37%       { transform: scaleX(0); opacity:1; }
    50%       { transform: scaleX(1); opacity:1; }
    50%,84%   { transform: scaleX(1) translateY(0); opacity:1; }
    92%       { transform: scaleX(1) translateY(-2px); opacity:0; }
    93%,100%  { transform: scaleX(0) translateY(0); opacity:0; }
  }
</style></defs>

<!-- Shadow -->
<rect class="shadow-bob" x="3" y="14" width="10" height="1" fill="#FF5522" opacity=".45"/>

<!-- Floating code particles (appear above/in front of character) -->
<g transform="translate(0.5, -3)">
  <rect class="code-line cl1" x="2"   y="-3.5" width="6"   height="0.7" fill="#FF9900" opacity="0.8"/>
  <rect class="code-line cl2" x="3.5" y="-1.8" width="9"   height="0.7" fill="#FF6600" opacity="0.8"/>
  <rect class="code-line cl3" x="3.5" y="-0.1" width="5"   height="0.7" fill="#FFCC00" opacity="0.7"/>
</g>

<!-- Active embers -->
<g fill="#FFD080">
  <rect class="em em1" x="4"  y="1"  width="1" height="1"/>
  <rect class="em em2" x="8"  y="2"  width="1" height="1"/>
  <rect class="em em3" x="6"  y="0"  width="1" height="1"/>
  <rect class="em em4" x="10" y="3"  width="1" height="1"/>
  <rect class="em em5" x="3"  y="2"  width="1" height="1"/>
</g>

<!-- Tips -->
<g class="ft-type">
  <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
  <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
  <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
  <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
  <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
</g>

<!-- Body -->
<g class="body-bounce">
  <g class="breathe">
    <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
    <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
    <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
    <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
    <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
    <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
    <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
    <rect x="4"  y="9"  width="7" height="1"  fill="#FF7744"/>
    <rect x="5"  y="10" width="5" height="1"  fill="#FF7744"/>
    <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
    <rect x="5"  y="8"  width="5" height="1"  fill="#FFAA66"/>
    <rect x="6"  y="9"  width="3" height="1"  fill="#FFAA66"/>
    <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
    <!-- Focused squinting eyes -->
    <g class="eyes-code" fill="#330000">
      <rect x="4" y="3" width="2" height="2"/>
      <rect x="9" y="3" width="2" height="2"/>
      <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".60"/>
      <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".60"/>
    </g>
    <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
  </g>
</g>

<!-- Arms (drawn on top, bob with body) -->
<g class="body-bounce">
  <g class="breathe">
    <g class="arm-l-type" fill="#EE4422"><rect x="0" y="5" width="2" height="2"/></g>
    <g class="arm-r-type" fill="#EE4422"><rect x="13" y="5" width="2" height="2"/></g>
  </g>
</g>
</svg>
