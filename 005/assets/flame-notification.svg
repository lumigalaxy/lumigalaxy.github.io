<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* Alert pose: startled, then settle */
  .body-alert {
    transform-origin: 7.5px 5px;
    animation: alert-body 3.5s infinite ease-in-out;
  }
  .eyes-alert {
    transform-origin: 7.5px 4px;
    animation: alert-eyes 3.5s infinite ease-in-out;
  }
  .arm-l-alert {
    transform-origin: 1px 5px;
    animation: arm-l 3.5s infinite ease-in-out;
  }
  .ft-alert {
    transform-origin: 7.5px -1px;
    animation: ft-alert 3.5s infinite ease-in-out;
  }
  .shadow-alert {
    transform-origin: 7.5px 14px;
    animation: shadow-alert 3.5s infinite ease-in-out;
  }
  .alert-bang {
    transform-origin: 14px -3px;
    animation: bang-pop 3.5s infinite ease-in-out;
    opacity: 0;
  }

  @keyframes alert-body {
    0%        { transform: translate(0,0) scale(1,1); }
    4%        { transform: translate(-1px,1px) scale(1.02,0.95); }
    10%,25%   { transform: translate(0,0) scale(1,1); }
    30%       { transform: translate(0,-0.5px) scale(0.98,1.02); }
    45%,100%  { transform: translate(0,0) scale(1,1); }
  }
  @keyframes alert-eyes {
    0%,3%     { transform: scaleY(1); }
    5%        { transform: scaleY(0.1); }
    7%        { transform: scaleY(1.3); }
    12%,100%  { transform: scaleY(1); }
  }
  @keyframes arm-l {
    0%,3%     { transform: rotate(0deg); }
    6%,15%    { transform: rotate(-35deg); }
    25%,100%  { transform: rotate(0deg); }
  }
  @keyframes ft-alert {
    0%        { transform: rotate(0deg) scaleY(1); }
    5%        { transform: rotate(-6deg) scaleY(1.2); }
    10%       { transform: rotate(5deg) scaleY(0.9); }
    18%,100%  { transform: rotate(0deg) scaleY(1); }
  }
  @keyframes shadow-alert {
    0%,3%     { transform: translate(0,0) scaleX(1); opacity:.45; }
    5%        { transform: translate(-1px,0) scaleX(0.92); opacity:.42; }
    12%,100%  { transform: translate(0,0) scaleX(1); opacity:.45; }
  }
  @keyframes bang-pop {
    0%        { opacity:0; transform:scale(0.3); }
    4%        { opacity:1; transform:scale(1.3); }
    8%,50%    { opacity:1; transform:scale(1); }
    60%       { opacity:0.5; transform:scale(0.9); }
    65%,100%  { opacity:0; }
  }
  /* Gentle idle breathe after alert settles */
  .fbrth { transform-origin:7.5px 5px; animation:fbrth 2.8s infinite ease-in-out; }
  @keyframes fbrth {
    0%,100% { transform: scaleX(1) scaleY(1) translateY(0); }
    50%     { transform: scaleX(1.02) scaleY(0.98) translateY(0.3px); }
  }
</style></defs>

<!-- Shadow -->
<rect class="shadow-alert" x="3" y="14" width="10" height="1" fill="#FF5522" opacity=".45"/>

<!-- Alert exclamation (right side) -->
<g class="alert-bang" fill="#FF4400">
  <rect x="14" y="-9" width="2" height="5"/>
  <rect x="14" y="-3" width="2" height="2"/>
</g>

<!-- Tips -->
<g class="ft-alert">
  <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
  <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
  <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
  <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
  <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
</g>

<!-- Body -->
<g class="body-alert">
  <g class="fbrth">
    <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
    <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
    <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
    <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
    <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
    <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
    <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
    <rect x="4"  y="9"  width="7" height="1"  fill="#FF7744"/>
    <rect x="5"  y="10" width="5" height="1"  fill="#FF7744"/>
    <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
    <rect x="5"  y="8"  width="5" height="1"  fill="#FFAA66"/>
    <rect x="6"  y="9"  width="3" height="1"  fill="#FFAA66"/>
    <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
    <g class="eyes-alert" fill="#330000">
      <rect x="4" y="3" width="2" height="2"/>
      <rect x="9" y="3" width="2" height="2"/>
      <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
      <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
    </g>
    <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    <g class="arm-l-alert" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
    <rect fill="#EE4422"                      x="13" y="5" width="2" height="2"/>
  </g>
</g>
</svg>
