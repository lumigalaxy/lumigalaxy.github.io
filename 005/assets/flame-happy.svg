<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* Happy bounce: big jump with squash/stretch */
  .bounce-anim {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: bounce 1s infinite ease-in-out;
  }
  .shadow-anim {
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: shadow 1s infinite ease-in-out;
  }
  /* Arms wave wildly */
  .arm-l {
    transform-box: fill-box;
    transform-origin: 100% 50%;
    animation: wave-l 0.16s infinite alternate ease-in-out;
  }
  .arm-r {
    transform-box: fill-box;
    transform-origin: 0% 50%;
    animation: wave-r 0.16s infinite alternate ease-in-out;
  }
  /* Tips flare wildly */
  .ft-happy {
    transform-origin: 7.5px -1px;
    animation: ft-happy 0.3s infinite ease-in-out;
  }
  /* Sparkles */
  .spark-center {
    opacity:0;
    animation: flash-center 1.5s infinite step-end;
    animation-delay: var(--delay, 0s);
  }
  .spark-outer {
    opacity:0;
    animation: flash-outer 1.5s infinite step-end;
    animation-delay: var(--delay, 0s);
  }

  @keyframes bounce {
    0%,15%,100% { transform: translateY(0) scaleY(1); }
    20%         { transform: translateY(0) scaleY(0.85); }
    40%         { transform: translateY(-9px) scaleY(1.05); }
    50%         { transform: translateY(-11px) scaleY(1); }
    60%         { transform: translateY(-9px) scaleY(1.05); }
    80%         { transform: translateY(0) scaleY(0.85); }
    85%         { transform: translateY(0) scaleY(1); }
  }
  @keyframes shadow {
    0%,15%,100% { transform: scale(1); opacity:.45; }
    20%         { transform: scale(1.1); opacity:.55; }
    40%         { transform: scale(0.6); opacity:.18; }
    50%         { transform: scale(0.5); opacity:.12; }
    60%         { transform: scale(0.6); opacity:.18; }
    80%         { transform: scale(1.1); opacity:.55; }
    85%         { transform: scale(1); opacity:.45; }
  }
  @keyframes wave-l {
    0%   { transform: rotate(45deg); }
    100% { transform: rotate(85deg); }
  }
  @keyframes wave-r {
    0%   { transform: rotate(-45deg); }
    100% { transform: rotate(-85deg); }
  }
  @keyframes ft-happy {
    0%,100% { transform: rotate(-8deg) scaleY(1.20); }
    50%     { transform: rotate( 8deg) scaleY(1.30); }
  }
  @keyframes flash-center {
    0%   { opacity:0; }
    10%  { opacity:1; }
    30%  { opacity:0; }
    100% { opacity:0; }
  }
  @keyframes flash-outer {
    0%   { opacity:0; }
    20%  { opacity:1; }
    40%  { opacity:0; }
    100% { opacity:0; }
  }
</style>
<g id="px-sparkle">
  <rect class="spark-center" x="-0.5" y="-0.5" width="1" height="1"/>
  <rect class="spark-outer" x="-0.5" y="-1.5" width="1" height="1"/>
  <rect class="spark-outer" x="-0.5" y=" 0.5" width="1" height="1"/>
  <rect class="spark-outer" x="-1.5" y="-0.5" width="1" height="1"/>
  <rect class="spark-outer" x=" 0.5" y="-0.5" width="1" height="1"/>
</g>
</defs>

<!-- Shadow -->
<rect class="shadow-anim" x="3" y="14" width="10" height="1" fill="#FF5522" opacity=".45"/>

<!-- Sparkles -->
<use href="#px-sparkle" fill="#FFD700" transform="translate(-2,-5)"  style="--delay:0.0s"/>
<use href="#px-sparkle" fill="#FF6600" transform="translate(17,-8)"  style="--delay:0.5s"/>
<use href="#px-sparkle" fill="#FFCC00" transform="translate(-4, 2)"  style="--delay:0.9s"/>
<use href="#px-sparkle" fill="#FF4400" transform="translate(19, 0)"  style="--delay:0.3s"/>
<use href="#px-sparkle" fill="#FFAA00" transform="translate( 7,-14)" style="--delay:0.7s"/>

<!-- Everything bounces together -->
<g class="bounce-anim">
  <!-- Tips (flaring) -->
  <g class="ft-happy">
    <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
    <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
    <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
    <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
    <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
    <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
    <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
  </g>

  <!-- Body -->
  <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
  <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
  <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
  <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
  <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
  <rect x="4"  y="9"  width="7" height="1"  fill="#FF7744"/>
  <rect x="5"  y="10" width="5" height="1"  fill="#FF7744"/>
  <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
  <rect x="5"  y="8"  width="5" height="1"  fill="#FFAA66"/>
  <rect x="6"  y="9"  width="3" height="1"  fill="#FFAA66"/>
  <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>

  <!-- Big bright happy eyes -->
  <rect x="4" y="3" width="2" height="2" fill="#330000"/>
  <rect x="9" y="3" width="2" height="2" fill="#330000"/>
  <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".90"/>
  <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".90"/>

  <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".90"/>
  <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".90"/>

  <!-- Arms waving high -->
  <g class="arm-l" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
  <g class="arm-r" fill="#EE4422"><rect x="13" y="5" width="2" height="2"/></g>
</g>
</svg>
