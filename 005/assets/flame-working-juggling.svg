<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  .breathe {
    transform-origin: 7.5px 5px;
    animation: fbrth 3.2s infinite ease-in-out;
  }
  /* Body rocks side to side */
  .body-rock {
    transform-origin: 7.5px 13px;
    animation: rock 1.2s infinite ease-in-out;
  }
  .shadow-rock {
    transform-origin: 7.5px 14px;
    animation: shadow-rock 1.2s infinite ease-in-out;
  }
  /* Arms: alternate catch/throw */
  .arm-l-jug {
    transform-origin: 1px 5px;
    animation: arm-jl 1.2s infinite ease-in-out;
  }
  .arm-r-jug {
    transform-origin: 14px 5px;
    animation: arm-jr 1.2s infinite ease-in-out;
  }
  /* Tips: energetic sway */
  .ft-jug {
    transform-origin: 7.5px -1px;
    animation: ft-jug 0.6s infinite ease-in-out;
  }
  /* Juggling embers: parabolic arc */
  .jball { animation: juggle 1.2s infinite; }
  .j1 { animation-delay: 0s;    fill: #FF4400; }
  .j2 { animation-delay: -0.4s; fill: #FFCC00; }
  .j3 { animation-delay: -0.8s; fill: #FF8800; }
  /* Eyes: track the balls */
  .eyes-jug {
    transform-origin: 7.5px 4px;
    animation: eyes-jug 2.4s infinite ease-in-out;
  }

  @keyframes fbrth {
    0%,100% { transform: scaleX(1) scaleY(1) translateY(0); }
    50%     { transform: scaleX(1.02) scaleY(0.98) translateY(0.4px); }
  }
  @keyframes rock {
    0%,50%,100% { transform: rotate(0deg) translateY(0); }
    25%         { transform: rotate(-3deg) translateY(0.3px); }
    75%         { transform: rotate(3deg) translateY(0.3px); }
  }
  @keyframes shadow-rock {
    0%,50%,100% { transform: scaleX(1); opacity:.45; }
    25%         { transform: scaleX(1.03) translateX(-0.3px); opacity:.48; }
    75%         { transform: scaleX(1.03) translateX(0.3px); opacity:.48; }
  }
  @keyframes arm-jl {
    0%,50%,100% { transform: rotate(18deg); }
    25%         { transform: rotate(38deg); }
    75%         { transform: rotate(-5deg); }
  }
  @keyframes arm-jr {
    0%,50%,100% { transform: rotate(-18deg); }
    25%         { transform: rotate(-5deg); }
    75%         { transform: rotate(-38deg); }
  }
  @keyframes ft-jug {
    0%,100% { transform: rotate(0deg) scaleY(1.0); }
    25%     { transform: rotate(-6deg) scaleY(1.14); }
    75%     { transform: rotate(5deg) scaleY(0.90); }
  }
  @keyframes eyes-jug {
    0%,20%   { transform: translate(-1.5px,-0.5px); }
    50%,70%  { transform: translate(1.5px,-0.5px); }
    100%     { transform: translate(-1.5px,-0.5px); }
  }
  /* Parabolic arc: left side → peak → right side */
  @keyframes juggle {
    0%   { transform: translate(2px,7px);  opacity:1; }
    25%  { transform: translate(5px,-4px); opacity:1; }
    50%  { transform: translate(8px,7px);  opacity:1; }
    51%  { transform: translate(8px,7px);  opacity:0; }
    52%  { transform: translate(2px,7px);  opacity:0; }
    53%  { transform: translate(2px,7px);  opacity:1; }
    100% { transform: translate(2px,7px);  opacity:1; }
  }
</style></defs>

<!-- Shadow -->
<rect class="shadow-rock" x="3" y="14" width="10" height="1" fill="#FF5522" opacity=".45"/>

<!-- Juggling embers (flame balls) -->
<g>
  <rect class="jball j1" x="0" y="0" width="2" height="2" rx="0.3"/>
  <rect class="jball j2" x="0" y="0" width="2" height="2" rx="0.3"/>
  <rect class="jball j3" x="0" y="0" width="2" height="2" rx="0.3"/>
</g>

<!-- Tips -->
<g class="ft-jug">
  <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
  <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
  <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
  <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
  <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
</g>

<!-- Body -->
<g class="body-rock">
  <g class="breathe">
    <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
    <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
    <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
    <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
    <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
    <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
    <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
    <rect x="4"  y="9"  width="7" height="1"  fill="#FF7744"/>
    <rect x="5"  y="10" width="5" height="1"  fill="#FF7744"/>
    <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
    <rect x="5"  y="8"  width="5" height="1"  fill="#FFAA66"/>
    <rect x="6"  y="9"  width="3" height="1"  fill="#FFAA66"/>
    <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
    <g class="eyes-jug" fill="#330000">
      <rect x="4" y="3" width="2" height="2"/>
      <rect x="9" y="3" width="2" height="2"/>
      <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
      <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
    </g>
    <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    <g class="arm-l-jug" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
    <g class="arm-r-jug" fill="#EE4422"><rect x="13" y="5" width="2" height="2"/></g>
  </g>
</g>
</svg>
