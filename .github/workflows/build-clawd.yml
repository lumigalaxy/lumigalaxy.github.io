name: Build Alien installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

defaults:
  run:
    working-directory: clawd-on-desk-0.6.0

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clawd-on-desk-0.6.0/package-lock.json
      - run: npm ci
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            clawd-on-desk-0.6.0/dist/*.exe
            clawd-on-desk-0.6.0/dist/latest.yml

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clawd-on-desk-0.6.0/package-lock.json
      - run: npm ci
      - run: npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            clawd-on-desk-0.6.0/dist/*.dmg
            clawd-on-desk-0.6.0/dist/latest-mac.yml

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: clawd-on-desk-0.6.0/docs/releases/release-${{ github.ref_name }}.md
