<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self';">
  <link rel="stylesheet" href="styles.css">
  <title>Clawd</title>
</head>
<body>
  <div id="speech-bubble" class="hidden">
    <div id="speech-text"></div>
  </div>
  <div id="intro-overlay" class="hidden">
    <object id="intro-ship" type="image/svg+xml" data="../assets/svg/intro-ship.svg"></object>
    <div id="intro-click-target"></div>
    <div id="intro-hint">「快帮帮我！我需要你的帮助！」</div>
  </div>
  <div id="pet-container">
    <object id="clawd" type="image/svg+xml" data="../assets/svg/clawd-idle-follow.svg"></object>
    <div id="game-overlay"></div>
    <div id="game-hud">
      <span class="score" id="game-score"></span>
      <span class="timer" id="game-timer"></span>
      <span class="combo" id="game-combo"></span>
    </div>
    <input id="bug-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
  <script src="renderer.js"></script>
</body>
</html>
