<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 24" width="300" height="240">
  <!-- Smoke particles (slower, settling) -->
  <g id="smoke">
    <circle cx="6" cy="5" r="2" fill="#888" opacity="0.3">
      <animate attributeName="cy" values="5;2;-1" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.15;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="24" cy="6" r="1.5" fill="#888" opacity="0.2">
      <animate attributeName="cy" values="6;3;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Ship body (same as closed, engines off) -->
  <g id="ship-body">
    <rect x="5" y="8" width="20" height="10" rx="3" fill="#5B6B7A"/>
    <rect x="7" y="7" width="16" height="2" rx="1" fill="#6E8090"/>
    <rect x="7" y="17" width="16" height="2" rx="1" fill="#4A5A68"/>
    <rect x="6" y="12" width="18" height="0.5" fill="#4A5A68" opacity="0.5"/>
    <rect x="6" y="14" width="18" height="0.5" fill="#4A5A68" opacity="0.5"/>

    <!-- Door OPEN — swung to the right -->
    <g id="ship-door-open">
      <!-- Door opening (dark interior) -->
      <rect x="11" y="9" width="8" height="7" rx="1.5" fill="#071A18"/>
      <!-- Interior glow -->
      <rect x="11.5" y="9.5" width="7" height="6" rx="1" fill="#0A2420"/>
      <!-- Light streaming out -->
      <rect x="12" y="15" width="6" height="5" fill="#3D8A83" opacity="0.15"/>
      <!-- Door panel (opened, shown as perspective) -->
      <rect x="19" y="9.5" width="2" height="6.5" rx="0.5" fill="#0D3D38" opacity="0.8"/>
      <rect x="19.3" y="10" width="0.8" height="1" rx="0.3" fill="#3D8A83" opacity="0.3"/>
    </g>

    <!-- Clawd peeking out (half-emerged) -->
    <g id="clawd-emerge">
      <!-- Horns -->
      <g fill="#3D8A83">
        <rect x="13" y="9" width="0.8" height="1.2"/>
        <rect x="16.2" y="9" width="0.8" height="1.2"/>
      </g>
      <!-- Body -->
      <rect x="12.5" y="10.5" width="5" height="4" rx="0.5" fill="#4DA8A0"/>
      <!-- Eye (big, blinking) -->
      <rect x="13.2" y="11" width="3.6" height="2" rx="0.4" fill="#FFFFFF"/>
      <rect x="14" y="11.3" width="2" height="1.4" rx="0.3" fill="#78C8A0"/>
      <rect x="14.8" y="11.8" width="0.8" height="0.7" fill="#1A1A1A"/>
      <!-- Pupil shimmer -->
      <rect x="14.5" y="11.5" width="0.4" height="0.3" fill="#FFFFFF" opacity="0.8"/>
      <!-- Mouth (happy) -->
      <rect x="13.5" y="13.5" width="3" height="0.8" rx="0.3" fill="#2D6B64"/>
      <g fill="#FFFFFF">
        <rect x="14" y="13.5" width="0.5" height="0.4"/>
        <rect x="15" y="13.5" width="0.5" height="0.5"/>
        <rect x="15.8" y="13.5" width="0.5" height="0.4"/>
      </g>
      <!-- Little hand waving -->
      <rect x="17.5" y="12" width="1.5" height="1" fill="#4DA8A0">
        <animateTransform attributeName="transform" type="rotate" values="-10 17.5 12.5;10 17.5 12.5;-10 17.5 12.5" dur="0.6s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Damage marks -->
    <g fill="#FF6B4A" opacity="0.7">
      <rect x="8" y="10" width="1.5" height="0.3" transform="rotate(-20 8 10)"/>
      <rect x="21" y="11" width="1.2" height="0.3" transform="rotate(15 21 11)"/>
    </g>

    <!-- Engines dead -->
    <rect x="3" y="11" width="2" height="4" rx="1" fill="#4A5A68" opacity="0.3"/>
    <rect x="25" y="11" width="2" height="4" rx="1" fill="#4A5A68" opacity="0.3"/>

    <!-- Landing gear -->
    <rect x="9" y="19" width="2" height="2" fill="#4A5A68"/>
    <rect x="19" y="19" width="2" height="2" fill="#4A5A68"/>
    <rect x="8" y="20.5" width="4" height="1" rx="0.3" fill="#3A4A58"/>
    <rect x="18" y="20.5" width="4" height="1" rx="0.3" fill="#3A4A58"/>
  </g>
</svg>
