<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* Robot body — stiff mechanical tilt */
      .robot-body {
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation: robot-tilt 2s infinite step-end;
      }
      @keyframes robot-tilt {
        0%   { transform: rotate(0deg) translateY(0); }
        12%  { transform: rotate(5deg) translateY(-2px); }
        25%  { transform: rotate(0deg) translateY(0); }
        37%  { transform: rotate(-5deg) translateY(-2px); }
        50%  { transform: rotate(0deg) translateY(0); }
        62%  { transform: rotate(3deg) translateY(-3px); }
        75%  { transform: rotate(-3deg) translateY(-3px); }
        87%  { transform: rotate(0deg) translateY(-1px); }
      }

      /* Left arm — angular robotic poses */
      .arm-robot-l {
        transform-box: fill-box;
        transform-origin: 100% 50%;
        animation: robo-arm-l 2s infinite step-end;
      }
      @keyframes robo-arm-l {
        0%   { transform: rotate(0deg); }
        12%  { transform: rotate(90deg); }
        25%  { transform: rotate(45deg); }
        37%  { transform: rotate(90deg); }
        50%  { transform: rotate(0deg); }
        62%  { transform: rotate(60deg); }
        75%  { transform: rotate(90deg); }
        87%  { transform: rotate(30deg); }
      }

      /* Right arm — offset angular poses */
      .arm-robot-r {
        transform-box: fill-box;
        transform-origin: 0% 50%;
        animation: robo-arm-r 2s infinite step-end;
      }
      @keyframes robo-arm-r {
        0%   { transform: rotate(-90deg); }
        12%  { transform: rotate(0deg); }
        25%  { transform: rotate(-60deg); }
        37%  { transform: rotate(0deg); }
        50%  { transform: rotate(-90deg); }
        62%  { transform: rotate(-30deg); }
        75%  { transform: rotate(0deg); }
        87%  { transform: rotate(-90deg); }
      }

      /* Robot legs — stiff alternating lift */
      .leg-robot-l {
        animation: robo-leg-l 2s infinite step-end;
      }
      .leg-robot-r {
        animation: robo-leg-r 2s infinite step-end;
      }
      @keyframes robo-leg-l {
        0%, 50% { transform: translateY(0); }
        12%, 62% { transform: translate(-1px, -1px); }
        25%, 75% { transform: translateY(0); }
        37%, 87% { transform: translate(1px, -1px); }
      }
      @keyframes robo-leg-r {
        0%, 50% { transform: translate(1px, -1px); }
        12%, 62% { transform: translateY(0); }
        25%, 75% { transform: translate(-1px, -1px); }
        37%, 87% { transform: translateY(0); }
      }

      /* Eye — digital scan effect */
      .robot-eye {
        animation: robo-scan 2s infinite step-end;
      }
      @keyframes robo-scan {
        0%   { transform: translateX(0); }
        12%  { transform: translateX(1px); }
        25%  { transform: translateX(0); }
        37%  { transform: translateX(-1px); }
        50%  { transform: translateX(0); }
        62%  { transform: translateX(0.5px); }
        75%  { transform: translateX(-0.5px); }
        87%  { transform: translateX(0); }
      }

      /* Scanline overlay */
      .scanline {
        animation: scanline-move 1.5s infinite linear;
        opacity: 0.15;
      }
      @keyframes scanline-move {
        0%   { transform: translateY(-25px); }
        100% { transform: translateY(20px); }
      }

      /* Robot shadow */
      .robot-shadow {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: robo-sh 2s infinite step-end;
      }
      @keyframes robo-sh {
        0%, 25%, 50%, 75% { transform: scaleX(1); opacity: 0.4; }
        12%, 62% { transform: scaleX(1.1); opacity: 0.5; }
        37%, 87% { transform: scaleX(0.9); opacity: 0.5; }
      }

      /* Electric sparks on horns */
      .horn-spark {
        animation: h-spark 0.5s infinite step-end;
      }
      .hs1 { animation-delay: 0s; }
      .hs2 { animation-delay: 0.15s; }
      .hs3 { animation-delay: 0.3s; }
      @keyframes h-spark {
        0%, 40% { opacity: 0; }
        50%, 70% { opacity: 1; }
        80%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Shadow -->
  <rect class="robot-shadow" x="3" y="15" width="9" height="1" fill="#000000"/>

  <!-- Character -->
  <g class="robot-body">
    <!-- Legs -->
    <g fill="#4DA8A0">
      <rect class="leg-robot-l" x="3" y="13" width="1" height="2"/>
      <rect class="leg-robot-l" x="5" y="13" width="1" height="2"/>
      <rect class="leg-robot-r" x="9" y="13" width="1" height="2"/>
      <rect class="leg-robot-r" x="11" y="13" width="1" height="2"/>
    </g>

    <!-- Horns with electric sparks -->
    <g fill="#3D8A83">
      <rect x="4" y="2" width="1" height="2"/>
      <rect x="3" y="3" width="1" height="1"/>
      <rect x="10" y="2" width="1" height="2"/>
      <rect x="11" y="3" width="1" height="1"/>
    </g>
    <g fill="#7DF9EE">
      <rect class="horn-spark hs1" x="3.5" y="1" width="1" height="1"/>
      <rect class="horn-spark hs2" x="10.5" y="1" width="1" height="1"/>
      <rect class="horn-spark hs3" x="4" y="0.5" width="0.5" height="0.5"/>
    </g>
    <rect x="3" y="4" width="9" height="2" fill="#4DA8A0"/>

    <!-- Torso -->
    <rect x="2" y="6" width="11" height="7" fill="#4DA8A0"/>

    <!-- Arms -->
    <g class="arm-robot-l"><rect x="0" y="9" width="2" height="2" fill="#4DA8A0"/></g>
    <g class="arm-robot-r"><rect x="13" y="9" width="2" height="2" fill="#4DA8A0"/></g>

    <!-- Cyclops Eye — digital look -->
    <g class="robot-eye">
      <rect x="5" y="7" width="5" height="3" fill="#FFFFFF" rx="0.5"/>
      <rect x="6" y="7.5" width="3" height="2" fill="#78C8A0" rx="0.3"/>
      <rect x="7" y="8" width="1" height="1" fill="#1A1A1A"/>
    </g>

    <!-- Mouth — flat line (serious robot face) -->
    <rect x="5" y="11.5" width="5" height="0.5" fill="#2D6B64"/>
  </g>

  <!-- CRT scanline overlay -->
  <rect class="scanline" x="-15" y="-25" width="45" height="3" fill="#7DF9EE"/>
</svg>
