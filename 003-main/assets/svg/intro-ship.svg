<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 24" width="300" height="240">
  <!-- Smoke particles (animated) -->
  <g id="smoke">
    <circle cx="6" cy="5" r="1.5" fill="#888" opacity="0.5">
      <animate attributeName="cy" values="5;1;-3" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.3;0" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.5;2.5;3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="24" cy="5" r="1.2" fill="#888" opacity="0.4">
      <animate attributeName="cy" values="5;2;-2" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.2;0" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.2;2;2.8" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="15" cy="3" r="1" fill="#999" opacity="0.3">
      <animate attributeName="cy" values="3;0;-4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.15;0" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1;1.8;2.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Ship body -->
  <g id="ship-body">
    <!-- Hull - rounded capsule shape -->
    <rect x="5" y="8" width="20" height="10" rx="3" fill="#5B6B7A"/>
    <rect x="7" y="7" width="16" height="2" rx="1" fill="#6E8090"/>
    <rect x="7" y="17" width="16" height="2" rx="1" fill="#4A5A68"/>
    
    <!-- Hull detail lines -->
    <rect x="6" y="12" width="18" height="0.5" fill="#4A5A68" opacity="0.5"/>
    <rect x="6" y="14" width="18" height="0.5" fill="#4A5A68" opacity="0.5"/>
    
    <!-- Window/Door (clickable area) -->
    <g id="ship-door">
      <rect x="11" y="9" width="8" height="7" rx="1.5" fill="#0A2A28"/>
      <rect x="11.5" y="9.5" width="7" height="6" rx="1" fill="#0D3D38"/>
      <!-- Glass reflection -->
      <rect x="12" y="10" width="2" height="1.5" rx="0.5" fill="#3D8A83" opacity="0.3"/>
    </g>
    
    <!-- Clawd visible inside window (silhouette) -->
    <g id="clawd-inside" opacity="0.6">
      <!-- Horns -->
      <rect x="13" y="10" width="0.8" height="1" fill="#3D8A83"/>
      <rect x="16.2" y="10" width="0.8" height="1" fill="#3D8A83"/>
      <!-- Head/body -->
      <rect x="12.5" y="11" width="5" height="3.5" rx="0.5" fill="#4DA8A0"/>
      <!-- Eye -->
      <rect x="13.5" y="11.5" width="3" height="1.5" rx="0.3" fill="#FFFFFF"/>
      <rect x="14.5" y="12" width="1" height="0.7" fill="#1A1A1A"/>
    </g>
    
    <!-- Damage marks -->
    <g fill="#FF6B4A" opacity="0.7">
      <rect x="8" y="10" width="1.5" height="0.3" transform="rotate(-20 8 10)"/>
      <rect x="21" y="11" width="1.2" height="0.3" transform="rotate(15 21 11)"/>
      <rect x="9" y="15" width="1" height="0.3" transform="rotate(-10 9 15)"/>
    </g>
    
    <!-- Engine glow (flickering) -->
    <rect x="3" y="11" width="2" height="4" rx="1" fill="#FF8C42" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="25" y="11" width="2" height="4" rx="1" fill="#FF8C42" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Landing gear -->
    <rect x="9" y="19" width="2" height="2" fill="#4A5A68"/>
    <rect x="19" y="19" width="2" height="2" fill="#4A5A68"/>
    <rect x="8" y="20.5" width="4" height="1" rx="0.3" fill="#3A4A58"/>
    <rect x="18" y="20.5" width="4" height="1" rx="0.3" fill="#3A4A58"/>
  </g>
  
  <!-- Fire trail (visible during fall) -->
  <g id="fire-trail">
    <rect x="12" y="21" width="6" height="3" rx="1" fill="#FF6B42" opacity="0.8">
      <animate attributeName="height" values="3;5;3" dur="0.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.5;0.8" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="13" y="22" width="4" height="2" rx="0.5" fill="#FFD700" opacity="0.6">
      <animate attributeName="height" values="2;4;2" dur="0.25s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
