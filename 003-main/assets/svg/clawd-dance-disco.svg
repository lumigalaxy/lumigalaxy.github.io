<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* Disco bounce — asymmetric, groovy */
      .disco-bounce {
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation: disco-bounce 0.6s infinite ease-in-out;
      }

      @keyframes disco-bounce {
        0%, 100% { transform: translateY(0) scaleY(1) rotate(0deg); }
        15% { transform: translateY(0) scaleY(0.85) rotate(0deg); }
        35% { transform: translateY(-8px) scaleY(1.05) rotate(-3deg); }
        50% { transform: translateY(-10px) scaleY(1) rotate(0deg); }
        65% { transform: translateY(-8px) scaleY(1.05) rotate(3deg); }
        85% { transform: translateY(0) scaleY(0.85) rotate(0deg); }
      }

      /* Left arm: pump up on beat */
      .arm-disco-l {
        transform-box: fill-box;
        transform-origin: 100% 50%;
        animation: disco-arm-l 0.6s infinite ease-in-out;
      }
      @keyframes disco-arm-l {
        0%, 100% { transform: rotate(20deg); }
        35%, 65% { transform: rotate(100deg); }
      }

      /* Right arm: pump up off-beat */
      .arm-disco-r {
        transform-box: fill-box;
        transform-origin: 0% 50%;
        animation: disco-arm-r 0.6s infinite ease-in-out;
      }
      @keyframes disco-arm-r {
        0%, 30% { transform: rotate(-100deg); }
        50% { transform: rotate(-20deg); }
        70%, 100% { transform: rotate(-100deg); }
      }

      /* Legs alternating stomp */
      .leg-stomp-l {
        animation: leg-l 0.6s infinite ease-in-out;
      }
      .leg-stomp-r {
        animation: leg-r 0.6s infinite ease-in-out;
      }
      @keyframes leg-l {
        0%, 100% { transform: translateY(0); }
        35%, 65% { transform: translateY(-1px); }
      }
      @keyframes leg-r {
        0%, 30% { transform: translateY(-1px); }
        50% { transform: translateY(0); }
        70%, 100% { transform: translateY(-1px); }
      }

      /* Happy eye squish */
      .disco-eyes {
        transform-origin: 7.5px 8.5px;
        animation: disco-blink 1.2s infinite;
      }
      @keyframes disco-blink {
        0%, 40%, 50%, 100% { transform: scaleY(1); }
        45% { transform: scaleY(0.15); }
      }

      /* Shadow pulse */
      .disco-shadow {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: disco-sh 0.6s infinite ease-in-out;
      }
      @keyframes disco-sh {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        35% { transform: scale(0.6); opacity: 0.2; }
        85% { transform: scale(1.1); opacity: 0.6; }
      }

      /* Disco floor lights */
      .disco-light {
        animation: disco-color 1.2s infinite;
      }
      .dl1 { animation-delay: 0s; }
      .dl2 { animation-delay: 0.2s; }
      .dl3 { animation-delay: 0.4s; }
      .dl4 { animation-delay: 0.6s; }
      .dl5 { animation-delay: 0.8s; }
      .dl6 { animation-delay: 1.0s; }
      @keyframes disco-color {
        0%   { fill: #FF5252; opacity: 0.8; }
        16%  { fill: #FFEB3B; opacity: 0.9; }
        33%  { fill: #4CAF50; opacity: 0.8; }
        50%  { fill: #2196F3; opacity: 0.9; }
        66%  { fill: #E040FB; opacity: 0.8; }
        83%  { fill: #FF9800; opacity: 0.9; }
        100% { fill: #FF5252; opacity: 0.8; }
      }

      /* Disco ball sparkle */
      .disco-ball-spark {
        animation: ball-twinkle 0.8s infinite step-end;
      }
      .dbs1 { animation-delay: 0s; }
      .dbs2 { animation-delay: 0.2s; }
      .dbs3 { animation-delay: 0.4s; }
      .dbs4 { animation-delay: 0.6s; }
      @keyframes ball-twinkle {
        0%, 50% { opacity: 1; }
        25%, 75% { opacity: 0.2; }
      }
    </style>
  </defs>

  <!-- Disco floor lights -->
  <g>
    <rect class="disco-light dl1" x="-8" y="16" width="5" height="1" rx="0.3" opacity="0.6"/>
    <rect class="disco-light dl2" x="-2" y="16" width="5" height="1" rx="0.3" opacity="0.6"/>
    <rect class="disco-light dl3" x="4" y="16" width="5" height="1" rx="0.3" opacity="0.6"/>
    <rect class="disco-light dl4" x="10" y="16" width="5" height="1" rx="0.3" opacity="0.6"/>
    <rect class="disco-light dl5" x="16" y="16" width="5" height="1" rx="0.3" opacity="0.6"/>
    <rect class="disco-light dl6" x="22" y="16" width="5" height="1" rx="0.3" opacity="0.6"/>
  </g>

  <!-- Mini disco ball -->
  <g transform="translate(7.5, -18)">
    <rect x="-0.3" y="0" width="0.6" height="4" fill="#999"/>
    <rect x="-2" y="4" width="4" height="4" rx="1" fill="#C0C0C0"/>
    <rect class="disco-ball-spark dbs1" x="-1.5" y="4.5" width="1" height="1" fill="#FFFFFF"/>
    <rect class="disco-ball-spark dbs2" x="0.5" y="5.5" width="1" height="1" fill="#FFFFFF"/>
    <rect class="disco-ball-spark dbs3" x="-0.5" y="6.5" width="1" height="1" fill="#FFFFFF"/>
    <rect class="disco-ball-spark dbs4" x="1" y="4.5" width="0.5" height="0.5" fill="#FFFFFF"/>
  </g>

  <!-- Shadow -->
  <rect class="disco-shadow" x="3" y="15" width="9" height="1" fill="#000000"/>

  <!-- Character -->
  <g class="disco-bounce">
    <!-- Legs -->
    <g fill="#4DA8A0">
      <rect class="leg-stomp-l" x="3" y="13" width="1" height="2"/>
      <rect class="leg-stomp-l" x="5" y="13" width="1" height="2"/>
      <rect class="leg-stomp-r" x="9" y="13" width="1" height="2"/>
      <rect class="leg-stomp-r" x="11" y="13" width="1" height="2"/>
    </g>

    <!-- Horns -->
    <g fill="#3D8A83">
      <rect x="4" y="2" width="1" height="2"/>
      <rect x="3" y="3" width="1" height="1"/>
      <rect x="10" y="2" width="1" height="2"/>
      <rect x="11" y="3" width="1" height="1"/>
    </g>
    <rect x="3" y="4" width="9" height="2" fill="#4DA8A0"/>

    <!-- Torso -->
    <rect x="2" y="6" width="11" height="7" fill="#4DA8A0"/>

    <!-- Arms -->
    <g class="arm-disco-l"><rect x="0" y="9" width="2" height="2" fill="#4DA8A0"/></g>
    <g class="arm-disco-r"><rect x="13" y="9" width="2" height="2" fill="#4DA8A0"/></g>

    <!-- Cyclops Eye — happy squint -->
    <g class="disco-eyes">
      <rect x="5" y="7" width="5" height="3" fill="#FFFFFF" rx="0.5"/>
      <rect x="6" y="7.5" width="3" height="2" fill="#78C8A0" rx="0.3"/>
      <rect x="7" y="8" width="1" height="1" fill="#1A1A1A"/>
    </g>

    <!-- Big smile -->
    <rect x="4" y="11" width="7" height="1.5" fill="#2D6B64" rx="0.3"/>
    <g fill="#FFFFFF">
      <rect x="5" y="11" width="1" height="0.7"/>
      <rect x="7" y="11" width="1" height="0.8"/>
      <rect x="9" y="11" width="1" height="0.7"/>
    </g>
  </g>
</svg>
