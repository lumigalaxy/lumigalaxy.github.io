<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* Full body spin */
      .spin-body {
        transform-origin: 7.5px 10px;
        animation: spin-rotate 1.2s infinite linear;
      }
      @keyframes spin-rotate {
        0%   { transform: rotate(0deg) scale(1); }
        25%  { transform: rotate(90deg) scale(0.92); }
        50%  { transform: rotate(180deg) scale(0.85); }
        75%  { transform: rotate(270deg) scale(0.92); }
        100% { transform: rotate(360deg) scale(1); }
      }

      /* Arms flung out during spin */
      .arm-spin-l {
        transform-box: fill-box;
        transform-origin: 100% 50%;
        animation: spin-arm-l 1.2s infinite linear;
      }
      @keyframes spin-arm-l {
        0%, 100% { transform: rotate(70deg); }
        50% { transform: rotate(85deg); }
      }

      .arm-spin-r {
        transform-box: fill-box;
        transform-origin: 0% 50%;
        animation: spin-arm-r 1.2s infinite linear;
      }
      @keyframes spin-arm-r {
        0%, 100% { transform: rotate(-70deg); }
        50% { transform: rotate(-85deg); }
      }

      /* Eye dizzy wobble */
      .spin-eye {
        transform-origin: 7.5px 8.5px;
        animation: dizzy-eye 0.3s infinite alternate ease-in-out;
      }
      @keyframes dizzy-eye {
        0%   { transform: translateX(-0.5px) rotate(-5deg); }
        100% { transform: translateX(0.5px) rotate(5deg); }
      }

      /* Shadow — pulsing circle during spin */
      .spin-shadow {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: spin-sh 1.2s infinite ease-in-out;
      }
      @keyframes spin-sh {
        0%, 100% { transform: scaleX(1); opacity: 0.5; }
        25%, 75% { transform: scaleX(0.7); opacity: 0.3; }
        50% { transform: scaleX(0.5); opacity: 0.2; }
      }

      /* Trail afterimages — ghost copies at different rotation offsets */
      .trail {
        opacity: 0;
        transform-origin: 7.5px 10px;
        animation: trail-flash 1.2s infinite linear;
      }
      .trail-1 { animation-delay: -0.15s; }
      .trail-2 { animation-delay: -0.3s; }
      .trail-3 { animation-delay: -0.45s; }
      @keyframes trail-flash {
        0%   { opacity: 0.25; transform: rotate(0deg) scale(0.9); }
        10%  { opacity: 0; }
        100% { opacity: 0; }
      }

      /* Speed lines */
      .speed-line {
        animation: speed-streak 0.4s infinite linear;
        opacity: 0;
      }
      .sl1 { animation-delay: 0s; }
      .sl2 { animation-delay: 0.1s; }
      .sl3 { animation-delay: 0.2s; }
      .sl4 { animation-delay: 0.3s; }
      @keyframes speed-streak {
        0%   { opacity: 0; transform: translateX(0) scaleX(1); }
        30%  { opacity: 0.5; transform: translateX(-2px) scaleX(1.5); }
        60%  { opacity: 0.3; transform: translateX(-4px) scaleX(2); }
        100% { opacity: 0; transform: translateX(-6px) scaleX(2.5); }
      }

      /* Star dizzy particles */
      .dizzy-star {
        animation: dizzy-orbit 1.2s infinite linear;
        opacity: 0.7;
      }
      .ds1 { animation-delay: 0s; }
      .ds2 { animation-delay: 0.4s; }
      .ds3 { animation-delay: 0.8s; }
      @keyframes dizzy-orbit {
        0%   { transform: translate(0, -14px) rotate(0deg); opacity: 0.8; }
        25%  { transform: translate(8px, -10px) rotate(90deg); opacity: 0.6; }
        50%  { transform: translate(0, -6px) rotate(180deg); opacity: 0.4; }
        75%  { transform: translate(-8px, -10px) rotate(270deg); opacity: 0.6; }
        100% { transform: translate(0, -14px) rotate(360deg); opacity: 0.8; }
      }
    </style>
  </defs>

  <!-- Shadow -->
  <rect class="spin-shadow" x="3" y="15" width="9" height="1" fill="#000000"/>

  <!-- Speed lines -->
  <g fill="#B2DFDB">
    <rect class="speed-line sl1" x="16" y="3" width="4" height="0.5" rx="0.2"/>
    <rect class="speed-line sl2" x="17" y="7" width="3" height="0.5" rx="0.2"/>
    <rect class="speed-line sl3" x="15" y="11" width="5" height="0.5" rx="0.2"/>
    <rect class="speed-line sl4" x="16" y="14" width="3" height="0.5" rx="0.2"/>
  </g>

  <!-- Trail afterimages -->
  <g class="trail trail-1" fill="#4DA8A0" opacity="0.2">
    <rect x="2" y="6" width="11" height="7"/>
    <rect x="3" y="13" width="1" height="2"/>
    <rect x="11" y="13" width="1" height="2"/>
  </g>
  <g class="trail trail-2" fill="#4DA8A0" opacity="0.15">
    <rect x="2" y="6" width="11" height="7"/>
    <rect x="3" y="13" width="1" height="2"/>
    <rect x="11" y="13" width="1" height="2"/>
  </g>
  <g class="trail trail-3" fill="#4DA8A0" opacity="0.1">
    <rect x="2" y="6" width="11" height="7"/>
    <rect x="3" y="13" width="1" height="2"/>
    <rect x="11" y="13" width="1" height="2"/>
  </g>

  <!-- Dizzy stars orbiting above head -->
  <g transform="translate(7.5, 8)">
    <rect class="dizzy-star ds1" x="-1" y="-1" width="2" height="2" fill="#FFD700" rx="0.3"/>
    <rect class="dizzy-star ds2" x="-0.7" y="-0.7" width="1.4" height="1.4" fill="#FFA000" rx="0.3"/>
    <rect class="dizzy-star ds3" x="-1.2" y="-1.2" width="1.8" height="1.8" fill="#FFF59D" rx="0.3"/>
  </g>

  <!-- Main spinning character -->
  <g class="spin-body">
    <!-- Legs -->
    <g fill="#4DA8A0">
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
    </g>

    <!-- Horns -->
    <g fill="#3D8A83">
      <rect x="4" y="2" width="1" height="2"/>
      <rect x="3" y="3" width="1" height="1"/>
      <rect x="10" y="2" width="1" height="2"/>
      <rect x="11" y="3" width="1" height="1"/>
    </g>
    <rect x="3" y="4" width="9" height="2" fill="#4DA8A0"/>

    <!-- Torso -->
    <rect x="2" y="6" width="11" height="7" fill="#4DA8A0"/>

    <!-- Arms flung out -->
    <g class="arm-spin-l"><rect x="0" y="9" width="2" height="2" fill="#4DA8A0"/></g>
    <g class="arm-spin-r"><rect x="13" y="9" width="2" height="2" fill="#4DA8A0"/></g>

    <!-- Dizzy eye — swirly pupil -->
    <g class="spin-eye">
      <rect x="5" y="7" width="5" height="3" fill="#FFFFFF" rx="0.5"/>
      <rect x="6" y="7.5" width="3" height="2" fill="#78C8A0" rx="0.3"/>
      <!-- Spiral pupil (@ shape) -->
      <rect x="6.8" y="7.8" width="1.4" height="1.4" fill="none" stroke="#1A1A1A" stroke-width="0.4" rx="0.5"/>
      <rect x="7.2" y="8.2" width="0.6" height="0.6" fill="#1A1A1A"/>
    </g>

    <!-- Open mouth — dizzy yell -->
    <rect x="5" y="11" width="5" height="2" fill="#2D6B64" rx="0.5"/>
    <rect x="5.5" y="11" width="1" height="0.8" fill="#FFFFFF"/>
    <rect x="8.5" y="11" width="1" height="0.8" fill="#FFFFFF"/>
  </g>
</svg>
