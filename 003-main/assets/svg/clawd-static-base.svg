<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 15 16" width="300" height="320">
  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
  
  <g id="master-group">
    <!-- Horns -->
    <g fill="#3D8A83">
      <rect x="4" y="2" width="1" height="2"/>
      <rect x="3" y="3" width="1" height="1"/>
      <rect x="10" y="2" width="1" height="2"/>
      <rect x="11" y="3" width="1" height="1"/>
    </g>
    <g id="body-color-group" fill="#4DA8A0">
      <!-- Head -->
      <rect x="3" y="4" width="9" height="2"/>
      <rect id="torso" x="2" y="6" width="11" height="7"/>
      <rect id="left-arm" x="0" y="9" width="2" height="2"/>
      <rect id="right-arm" x="13" y="9" width="2" height="2"/>
      
      <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
      <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
      <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
      <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
    </g>
    <!-- Fur tufts -->
    <g fill="#6EC4BC">
      <rect x="2" y="5" width="1" height="1"/>
      <rect x="12" y="5" width="1" height="1"/>
      <rect x="5" y="4" width="1" height="1"/>
      <rect x="9" y="4" width="1" height="1"/>
    </g>
    <!-- Single Cyclops Eye -->
    <rect x="5" y="7" width="5" height="3" fill="#FFFFFF" rx="0.5"/>
    <rect x="6" y="7.5" width="3" height="2" fill="#78C8A0" rx="0.3"/>
    <rect x="7" y="8" width="1" height="1" fill="#1A1A1A"/>
    <!-- Mouth with teeth -->
    <rect x="4" y="11" width="7" height="1.5" fill="#2D6B64" rx="0.3"/>
    <g fill="#FFFFFF">
      <rect x="5" y="11" width="1" height="0.7"/>
      <rect x="7" y="11" width="1" height="0.8"/>
      <rect x="9" y="11" width="1" height="0.7"/>
    </g>
  </g>
</svg>