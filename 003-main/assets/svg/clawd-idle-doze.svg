<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* Dozing — looping gentle breathing in yawn-end squashed pose, eyes shut */
      .doze-body {
        transform-origin: 7.5px 13px;
        animation: doze-breathe 4s infinite ease-in-out;
      }

      .doze-shadow {
        transform-origin: 7.5px 15.5px;
        animation: doze-shadow 4s infinite ease-in-out;
      }

      .eyes-shut {
        transform-origin: 7.5px 9px;
        transform: scaleY(0.1);
        transition: transform 0.3s ease-out;
      }

      .arm-l-doze {
        transform-origin: 1px 10px;
        transform: translate(0px, 1px) rotate(-15deg);
      }

      .arm-r-doze {
        transform-origin: 14px 10px;
        transform: translate(0px, 1px) rotate(15deg);
      }

      @keyframes doze-breathe {
        0%, 100% { transform: scale(1.05, 0.95) translate(0, 1px); }
        50% { transform: scale(1.08, 0.92) translate(0, 1.8px); }
      }

      @keyframes doze-shadow {
        0%, 100% { transform: scaleX(1.05); opacity: 0.55; }
        50% { transform: scaleX(1.08); opacity: 0.5; }
      }
    </style>
  </defs>

  <!-- Ground Shadow -->
  <rect class="doze-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>

  <!-- Static Legs -->
  <g id="legs" fill="#4DA8A0">
    <rect x="3" y="12" width="1" height="3"/>
    <rect x="5" y="12" width="1" height="3"/>
    <rect x="9" y="12" width="1" height="3"/>
    <rect x="11" y="12" width="1" height="3"/>
  </g>

  <!-- Upper Body (gentle doze breathing) -->
  <g class="doze-body">
    <!-- Horns -->
    <g fill="#3D8A83">
      <rect x="4" y="2" width="1" height="2"/>
      <rect x="3" y="3" width="1" height="1"/>
      <rect x="10" y="2" width="1" height="2"/>
      <rect x="11" y="3" width="1" height="1"/>
    </g>
    <rect x="3" y="4" width="9" height="2" fill="#4DA8A0"/>
    <g fill="#6EC4BC">
      <rect x="2" y="5" width="1" height="1"/>
      <rect x="12" y="5" width="1" height="1"/>
    </g>
    <!-- Torso -->
    <rect x="2" y="6" width="11" height="7" fill="#4DA8A0"/>
    <rect x="0" y="9" width="2" height="2" fill="#4DA8A0"/>
    <rect x="13" y="9" width="2" height="2" fill="#4DA8A0"/>

    <!-- Single eye: initially shut, JS will open on wake -->
    <g id="eyes-doze" class="eyes-shut">
      <rect x="5" y="7" width="5" height="3" fill="#FFFFFF" rx="0.5"/>
      <rect x="6" y="7.5" width="3" height="2" fill="#78C8A0" rx="0.3"/>
      <rect x="7" y="8" width="1" height="1" fill="#1A1A1A"/>
    </g>

    <!-- Mouth (relaxed, no teeth) -->
    <rect x="5" y="11" width="5" height="1" fill="#2D6B64" rx="0.3"/>
  </g>
</svg>
