<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="300" height="300">
  <defs>
    <style>
      .glitch-body {
        animation: glitchShake 0.1s infinite step-end;
      }
      .glitch-fill {
        animation: glitchColor 0.2s infinite step-end;
      }
      .glitch-blink {
        animation: glitchOpacity 0.15s infinite step-end;
      }
      .error-icon {
        animation: errorFlash 0.25s infinite step-end;
      }
      @keyframes glitchShake {
        0%   { transform: translateX(0); }
        25%  { transform: translateX(-3px); }
        50%  { transform: translateX(3px); }
        75%  { transform: translateX(-1px); }
        100% { transform: translateX(0); }
      }
      @keyframes glitchColor {
        0%   { fill: #E8A4F0; }
        25%  { fill: #FF0000; }
        50%  { fill: #0000FF; }
        75%  { fill: #FFFFFF; }
        100% { fill: #E8A4F0; }
      }
      @keyframes glitchOpacity {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.3; }
      }
      @keyframes errorFlash {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Shadow -->
  <rect x="3" y="16" width="9" height="1" fill="#000000" opacity="0.35"/>

  <!-- Red ERROR pixel icon above head -->
  <g class="error-icon">
    <!-- Big X -->
    <rect x="6"  y="-14" width="1" height="1" fill="#FF0000"/>
    <rect x="7"  y="-13" width="1" height="1" fill="#FF0000"/>
    <rect x="8"  y="-12" width="1" height="1" fill="#FF0000"/>
    <rect x="9"  y="-13" width="1" height="1" fill="#FF0000"/>
    <rect x="10" y="-14" width="1" height="1" fill="#FF0000"/>
    <rect x="8"  y="-14" width="1" height="1" fill="#FF0000"/>
    <rect x="6"  y="-12" width="1" height="1" fill="#FF0000"/>
    <rect x="10" y="-12" width="1" height="1" fill="#FF0000"/>
  </g>

  <!-- Character: system error / glitch -->
  <g class="glitch-body">

    <!-- Antennae straight up (alert) -->
    <rect x="4"  y="-10" width="1" height="8"  fill="#5C3A6E"/>
    <rect x="3"  y="-14" width="3" height="4"  fill="#5C3A6E"/>
    <rect x="3"  y="-13" width="2" height="2"  fill="#FF6FB5"/>

    <rect x="10" y="-7"  width="1" height="5"  fill="#5C3A6E"/>
    <rect x="9"  y="-10" width="3" height="3"  fill="#5C3A6E"/>
    <rect x="9"  y="-9"  width="2" height="2"  fill="#FFE55C"/>

    <rect x="7"  y="-12" width="1" height="1"  fill="#FF4444"/>

    <!-- Body outline -->
    <rect x="3"  y="-2"  width="9"  height="1"  fill="#5C3A6E"/>
    <rect x="2"  y="-1"  width="11" height="1"  fill="#5C3A6E"/>
    <rect x="1"  y="0"   width="13" height="13" fill="#5C3A6E"/>
    <rect x="2"  y="13"  width="11" height="1"  fill="#5C3A6E"/>
    <rect x="3"  y="14"  width="9"  height="1"  fill="#5C3A6E"/>

    <!-- Body fill: glitching color -->
    <rect class="glitch-fill" x="3"  y="-1"  width="9"  height="1"  fill="#E8A4F0"/>
    <rect class="glitch-fill" x="2"  y="0"   width="11" height="13" fill="#E8A4F0"/>
    <rect class="glitch-fill" x="3"  y="13"  width="9"  height="1"  fill="#E8A4F0"/>

    <!-- Highlight -->
    <rect class="glitch-blink" x="3"  y="0"   width="2"  height="1"  fill="#FFD6FF"/>
    <rect class="glitch-blink" x="3"  y="1"   width="1"  height="1"  fill="#FFD6FF"/>

    <!-- Dead pixel eye (black square, glitching) -->
    <rect class="glitch-blink" x="5"  y="4"   width="5"  height="5"  fill="#000000"/>
    <rect class="glitch-blink" x="6"  y="5"   width="3"  height="3"  fill="#2A1A33"/>

    <!-- Nose -->
    <rect x="7"  y="9"   width="1"  height="1"  fill="#5C3A6E"/>

    <!-- Flat line mouth (system halted) -->
    <rect x="5"  y="11"  width="5"  height="1"  fill="#5C3A6E"/>

    <!-- Arms (stiff / frozen) -->
    <rect x="-1" y="8"   width="2"  height="4"  fill="#5C3A6E"/>
    <rect x="-1" y="9"   width="1"  height="3"  fill="#E8A4F0"/>

    <rect x="14" y="8"   width="2"  height="4"  fill="#5C3A6E"/>
    <rect x="15" y="9"   width="1"  height="3"  fill="#E8A4F0"/>

    <!-- Feet -->
    <rect x="4"  y="15"  width="2"  height="1"  fill="#5C3A6E"/>
    <rect x="4"  y="15"  width="1"  height="1"  fill="#C070CC"/>
    <rect x="9"  y="15"  width="2"  height="1"  fill="#5C3A6E"/>
    <rect x="10" y="15"  width="1"  height="1"  fill="#C070CC"/>

  </g>

  <!-- Glitch scanline overlay -->
  <rect class="glitch-blink" x="1" y="2"  width="13" height="1" fill="#00FF00" opacity="0.4"/>
  <rect class="glitch-blink" x="1" y="8"  width="13" height="1" fill="#FF0000" opacity="0.3"/>
  <rect class="glitch-blink" x="1" y="12" width="13" height="1" fill="#0000FF" opacity="0.3"/>
</svg>
