<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="300" height="300">
  <defs>
    <style>
      .wake-stretch {
        transform-origin: 7.5px 15px;
        animation: wakeStretch 2s infinite ease-in-out;
      }
      .shadow-wake {
        transform-origin: 7.5px 16px;
        animation: shadowWake 2s infinite ease-in-out;
      }
      @keyframes wakeStretch {
        0%, 100% { transform: scale(1, 1); }
        30%       { transform: scale(1.06, 0.94) translate(0, -1px); }
        60%       { transform: scale(0.96, 1.04); }
      }
      @keyframes shadowWake {
        0%, 100% { transform: scaleX(1); opacity: 0.35; }
        30%       { transform: scaleX(0.8); opacity: 0.25; }
        60%       { transform: scaleX(1.1); opacity: 0.4; }
      }
    </style>
  </defs>

  <!-- Shadow -->
  <rect class="shadow-wake" x="3" y="16" width="9" height="1" fill="#000000"/>

  <!-- Character waking up -->
  <g class="wake-stretch">

    <!-- Asymmetric dual antennae (still sleepy, slightly droopy) -->
    <rect x="4"  y="-10" width="1" height="8"  fill="#5C3A6E"/>
    <rect x="3"  y="-14" width="3" height="4"  fill="#5C3A6E"/>
    <rect x="3"  y="-13" width="2" height="2"  fill="#FF6FB5"/>
    <rect x="3"  y="-13" width="1" height="1"  fill="#FFFFFF"/>

    <rect x="10" y="-7"  width="1" height="5"  fill="#5C3A6E"/>
    <rect x="9"  y="-10" width="3" height="3"  fill="#5C3A6E"/>
    <rect x="9"  y="-9"  width="2" height="2"  fill="#FFE55C"/>
    <rect x="9"  y="-9"  width="1" height="1"  fill="#FFFFFF"/>

    <rect x="7"  y="-12" width="1" height="1"  fill="#00D4FF"/>

    <!-- Body outline -->
    <rect x="3"  y="-2"  width="9"  height="1"  fill="#5C3A6E"/>
    <rect x="2"  y="-1"  width="11" height="1"  fill="#5C3A6E"/>
    <rect x="1"  y="0"   width="13" height="13" fill="#5C3A6E"/>
    <rect x="2"  y="13"  width="11" height="1"  fill="#5C3A6E"/>
    <rect x="3"  y="14"  width="9"  height="1"  fill="#5C3A6E"/>

    <!-- Body fill (sleepy dimmed) -->
    <rect x="3"  y="-1"  width="9"  height="1"  fill="#D488E0"/>
    <rect x="2"  y="0"   width="11" height="13" fill="#D488E0"/>
    <rect x="3"  y="13"  width="9"  height="1"  fill="#D488E0"/>

    <!-- Subtle highlight -->
    <rect x="3"  y="0"   width="2"  height="1"  fill="#E8B8F0"/>
    <rect x="3"  y="1"   width="1"  height="1"  fill="#E8B8F0"/>

    <!-- One eye half open (waking up) -->
    <rect x="5"  y="5"   width="5"  height="1"  fill="#5C3A6E"/>
    <rect x="5"  y="6"   width="1"  height="1"  fill="#5C3A6E"/>
    <rect x="9"  y="6"   width="1"  height="1"  fill="#5C3A6E"/>
    <rect x="6"  y="6"   width="3"  height="1"  fill="#FFFFFF"/>
    <rect x="7"  y="6"   width="1"  height="1"  fill="#2A1A33"/>

    <!-- Nose -->
    <rect x="7"  y="9"   width="1"  height="1"  fill="#5C3A6E"/>

    <!-- Small smile -->
    <rect x="5"  y="11"  width="1"  height="1"  fill="#5C3A6E"/>
    <rect x="6"  y="12"  width="3"  height="1"  fill="#5C3A6E"/>
    <rect x="9"  y="11"  width="1"  height="1"  fill="#5C3A6E"/>

    <!-- Cheek blush (faint) -->
    <rect x="2"  y="7"   width="2"  height="2"  fill="#FF6FB5" opacity="0.3"/>
    <rect x="11" y="7"   width="2"  height="2"  fill="#FF6FB5" opacity="0.3"/>

    <!-- Arms stretching up -->
    <rect x="-2" y="5"   width="3"  height="5"  fill="#5C3A6E"/>
    <rect x="-1" y="6"   width="2"  height="4"  fill="#D488E0"/>

    <rect x="14" y="5"   width="3"  height="5"  fill="#5C3A6E"/>
    <rect x="14" y="6"   width="2"  height="4"  fill="#D488E0"/>

    <!-- Feet -->
    <rect x="4"  y="15"  width="2"  height="1"  fill="#5C3A6E"/>
    <rect x="4"  y="15"  width="1"  height="1"  fill="#C070CC"/>
    <rect x="9"  y="15"  width="2"  height="1"  fill="#5C3A6E"/>
    <rect x="10" y="15"  width="1"  height="1"  fill="#C070CC"/>

  </g>
</svg>
