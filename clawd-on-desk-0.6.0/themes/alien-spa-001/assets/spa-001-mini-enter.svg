<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -40 45 60" width="300" height="300">
  <defs>
    <style>
      /* ── Rift crack: tears open then seals ── */
      .rift-root {
        animation: riftOpen 2s ease-out 0s forwards;
        transform-origin: 7.5px 6px;
      }
      @keyframes riftOpen {
        0%   { transform: scaleX(0.02) scaleY(0.05); opacity: 0.3; }
        12%  { transform: scaleX(0.6)  scaleY(0.7);  opacity: 1; }
        25%  { transform: scaleX(1)    scaleY(1);    opacity: 1; }
        70%  { transform: scaleX(1)    scaleY(1);    opacity: 1; }
        88%  { transform: scaleX(0.3)  scaleY(0.8);  opacity: 0.5; }
        100% { transform: scaleX(0)    scaleY(0.3);  opacity: 0; }
      }

      /* ── Pet squeezes out of the rift ── */
      .pet-squeeze {
        animation: squeezeOut 1.7s ease-out 0.25s forwards;
        transform-origin: 7.5px 8px;
      }
      @keyframes squeezeOut {
        0%   { transform: scaleX(0.08) scaleY(1.35) translateY(4px); opacity: 0.2; }
        15%  { transform: scaleX(0.25) scaleY(1.2)  translateY(2px); opacity: 0.7; }
        30%  { transform: scaleX(0.55) scaleY(1.08) translateY(0.5px); opacity: 1; }
        45%  { transform: scaleX(0.85) scaleY(1.02) translateY(0px); }
        58%  { transform: scaleX(1.12) scaleY(0.92) translateY(-1px); }
        72%  { transform: scaleX(0.95) scaleY(1.04) translateY(0.3px); }
        85%  { transform: scaleX(1.03) scaleY(0.98) translateY(-0.2px); }
        100% { transform: scaleX(1)    scaleY(1)    translateY(0px); }
      }

      /* ── Eyes snap open after emerging ── */
      .eye-snap {
        animation: eyeSnap 0.35s ease-out 1.1s both;
        transform-origin: 7.5px 6.5px;
      }
      @keyframes eyeSnap {
        0%   { transform: scaleY(0.06); opacity: 0; }
        50%  { transform: scaleY(1.25); opacity: 1; }
        100% { transform: scaleY(1);    opacity: 1; }
      }

      /* ── Antennae wobble after emerging ── */
      .ant-wobble {
        animation: antWobble 0.45s ease-in-out 1.25s both;
        transform-origin: 7.5px -6px;
      }
      @keyframes antWobble {
        0%   { transform: rotate(0); }
        25%  { transform: rotate(-14deg); }
        60%  { transform: rotate(9deg); }
        100% { transform: rotate(0); }
      }

      /* ── Spark / energy particles burst on rift open ── */
      .spark-burst {
        animation: sparkBurst 0.6s ease-out 0.2s forwards;
        transform-origin: 7.5px 6px;
      }
      @keyframes sparkBurst {
        0%   { opacity: 0; transform: scale(0); }
        20%  { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(2) translateY(-4px); }
      }

      /* ── Rift glow pulse ── */
      .rift-glow {
        animation: glowPulse 2s ease-in-out 0s forwards;
        transform-origin: 7.5px 6px;
      }
      @keyframes glowPulse {
        0%   { opacity: 0; }
        10%  { opacity: 0.7; }
        25%  { opacity: 1; }
        60%  { opacity: 0.8; }
        80%  { opacity: 0.3; }
        100% { opacity: 0; }
      }

      /* ── Floating pixel shards drift away ── */
      .shard-1 { animation: drift1 1.2s ease-out 0.4s forwards; }
      .shard-2 { animation: drift2 1.4s ease-out 0.55s forwards; }
      .shard-3 { animation: drift3 1.1s ease-out 0.3s forwards; }
      .shard-4 { animation: drift4 1.3s ease-out 0.65s forwards; }
      @keyframes drift1 { 0% { opacity:1; transform: translate(0,0) scale(1); } 100% { opacity:0; transform: translate(-5px,-10px) scale(0.3); } }
      @keyframes drift2 { 0% { opacity:1; transform: translate(0,0) scale(1); } 100% { opacity:0; transform: translate(6px,-8px) scale(0.3); } }
      @keyframes drift3 { 0% { opacity:1; transform: translate(0,0) scale(1); } 100% { opacity:0; transform: translate(-3px,7px) scale(0.3); } }
      @keyframes drift4 { 0% { opacity:1; transform: translate(0,0) scale(1); } 100% { opacity:0; transform: translate(4px,6px) scale(0.3); } }

      /* ── Cheeks blush in ── */
      .cheek-blush {
        animation: blushIn 0.4s ease-out 1.2s both;
      }
      @keyframes blushIn {
        0%   { opacity: 0; }
        100% { opacity: 0.5; }
      }
    </style>
  </defs>

  <!-- ═══════════════════════════════════════════════════════
       PHASE 1: Rift crack tears reality (behind pet)
       ═══════════════════════════════════════════════════════ -->

  <!-- Outer glow halo -->
  <g class="rift-glow">
    <rect x="5"  y="-20" width="5"  height="44" fill="#8B5CF6" opacity="0.25"/>
    <rect x="6"  y="-15" width="3"  height="34" fill="#A78BFA" opacity="0.35"/>
  </g>

  <!-- Main rift tear: dark void with jagged edges -->
  <g class="rift-root">
    <!-- Left jagged edge (dark purple) -->
    <rect x="6"  y="-18" width="1" height="4"  fill="#5C3A6E"/>
    <rect x="5"  y="-14" width="1" height="5"  fill="#4C2A5E"/>
    <rect x="5"  y="-9"  width="2" height="6"  fill="#5C3A6E"/>
    <rect x="4"  y="-3"  width="2" height="5"  fill="#4C2A5E"/>
    <rect x="4"  y="2"   width="2" height="7"  fill="#5C3A6E"/>
    <rect x="5"  y="9"   width="1" height="6"  fill="#4C2A5E"/>
    <rect x="6"  y="15"  width="1" height="5"  fill="#5C3A6E"/>

    <!-- Right jagged edge (dark purple) -->
    <rect x="9"  y="-16" width="1" height="5"  fill="#5C3A6E"/>
    <rect x="10" y="-11" width="1" height="6"  fill="#4C2A5E"/>
    <rect x="9"  y="-5"  width="2" height="5"  fill="#5C3A6E"/>
    <rect x="9"  y="0"   width="2" height="7"  fill="#4C2A5E"/>
    <rect x="10" y="7"   width="2" height="5"  fill="#5C3A6E"/>
    <rect x="9"  y="12"  width="1" height="6"  fill="#4C2A5E"/>
    <rect x="8"  y="18"  width="1" height="4"  fill="#5C3A6E"/>

    <!-- Core bright tear (cyan-white energy) -->
    <rect x="7"  y="-20" width="1" height="46" fill="#00D4FF" opacity="0.6"/>
    <rect x="7"  y="-15" width="1" height="36" fill="#FFFFFF" opacity="0.4"/>
    <rect x="7"  y="-8"  width="1" height="18" fill="#FF6FB5" opacity="0.35"/>
  </g>

  <!-- Spark burst at rift center -->
  <g class="spark-burst">
    <rect x="5"  y="4"   width="1" height="1" fill="#FFFFFF" opacity="0.95"/>
    <rect x="9"  y="5"   width="1" height="1" fill="#FFE55C" opacity="0.95"/>
    <rect x="6"  y="8"   width="1" height="1" fill="#00D4FF" opacity="0.95"/>
    <rect x="8"  y="2"   width="1" height="1" fill="#FF6FB5" opacity="0.95"/>
    <rect x="4"  y="6"   width="1" height="1" fill="#FFFFFF" opacity="0.8"/>
    <rect x="10" y="7"   width="1" height="1" fill="#FFE55C" opacity="0.8"/>
  </g>

  <!-- Drifting pixel shards -->
  <g class="shard-1">
    <rect x="2"  y="3"   width="1" height="1" fill="#00D4FF" opacity="0.8"/>
  </g>
  <g class="shard-2">
    <rect x="13" y="5"   width="1" height="1" fill="#FF6FB5" opacity="0.8"/>
  </g>
  <g class="shard-3">
    <rect x="3"  y="12"  width="1" height="1" fill="#FFE55C" opacity="0.7"/>
  </g>
  <g class="shard-4">
    <rect x="12" y="10"  width="1" height="1" fill="#FFFFFF" opacity="0.7"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       PHASE 2: Pet squeezes out of the rift
       ═══════════════════════════════════════════════════════ -->
  <g class="pet-squeeze">

    <!-- Ground shadow (fades in as pet solidifies) -->
    <g style="animation: shadowIn 1.8s ease-out 0.5s forwards; transform-origin: 7.5px 15px;">
      <style>
        @keyframes shadowIn {
          0%   { opacity: 0; transform: scaleX(0.1); }
          30%  { opacity: 0.15; transform: scaleX(0.4); }
          60%  { opacity: 0.3; transform: scaleX(0.9); }
          100% { opacity: 0.35; transform: scaleX(1); }
        }
      </style>
      <rect x="3" y="16" width="9" height="1" fill="#000000" opacity="0.35"/>
    </g>

    <!-- Asymmetric dual antennae -->
    <g class="ant-wobble">
      <rect x="4"  y="-10" width="1" height="8"  fill="#5C3A6E"/>
      <rect x="3"  y="-14" width="3" height="4"  fill="#5C3A6E"/>
      <rect x="3"  y="-13" width="2" height="2"  fill="#FF6FB5"/>
      <rect x="3"  y="-13" width="1" height="1"  fill="#FFFFFF"/>

      <rect x="10" y="-7"  width="1" height="5"  fill="#5C3A6E"/>
      <rect x="9"  y="-10" width="3" height="3"  fill="#5C3A6E"/>
      <rect x="9"  y="-9"  width="2" height="2"  fill="#FFE55C"/>
      <rect x="9"  y="-9"  width="1" height="1"  fill="#FFFFFF"/>
    </g>

    <rect x="7"  y="-12" width="1" height="1"  fill="#00D4FF"/>

    <!-- Body outline: round pink blob -->
    <rect x="3"  y="-2"  width="9"  height="1"  fill="#5C3A6E"/>
    <rect x="2"  y="-1"  width="11" height="1"  fill="#5C3A6E"/>
    <rect x="1"  y="0"   width="13" height="13" fill="#5C3A6E"/>
    <rect x="2"  y="13"  width="11" height="1"  fill="#5C3A6E"/>
    <rect x="3"  y="14"  width="9"  height="1"  fill="#5C3A6E"/>

    <!-- Body fill: soft lavender-pink -->
    <rect x="3"  y="-1"  width="9"  height="1"  fill="#F4A4FF"/>
    <rect x="2"  y="0"   width="11" height="13" fill="#F4A4FF"/>
    <rect x="3"  y="13"  width="9"  height="1"  fill="#F4A4FF"/>

    <!-- Highlight sheen -->
    <rect x="3"  y="0"   width="3"  height="1"  fill="#FFD6FF"/>
    <rect x="3"  y="1"   width="2"  height="2"  fill="#FFD6FF"/>
    <rect x="3"  y="1"   width="1"  height="1"  fill="#FFFFFF"/>

    <!-- Eye socket -->
    <rect x="3"  y="2"   width="9"  height="9"  fill="#5C3A6E"/>
    <rect x="4"  y="3"   width="7"  height="7"  fill="#FFFFFF"/>

    <!-- Pupil: snaps open after emerging -->
    <g class="eye-snap">
      <rect x="6"  y="5"   width="3"  height="3"  fill="#2A1A33"/>
      <rect x="7"  y="4"   width="2"  height="1"  fill="#FFFFFF"/>
    </g>

    <!-- Nose -->
    <rect x="7"  y="10"  width="1"  height="1"  fill="#5C3A6E"/>

    <!-- Smile -->
    <rect x="5"  y="11"  width="1"  height="1"  fill="#5C3A6E"/>
    <rect x="6"  y="12"  width="3"  height="1"  fill="#5C3A6E"/>
    <rect x="9"  y="11"  width="1"  height="1"  fill="#5C3A6E"/>

    <!-- Cheeks -->
    <rect x="2"  y="7"   width="2"  height="2"  fill="#FF6FB5" class="cheek-blush" opacity="0.5"/>
    <rect x="11" y="7"   width="2"  height="2"  fill="#FF6FB5" class="cheek-blush" opacity="0.5"/>

    <!-- Arms -->
    <rect x="-1" y="8"   width="3"  height="3"  fill="#5C3A6E"/>
    <rect x="0"  y="9"   width="2"  height="2"  fill="#F4A4FF"/>
    <rect x="0"  y="9"   width="1"  height="1"  fill="#FFD6FF"/>

    <rect x="14" y="8"   width="3"  height="3"  fill="#5C3A6E"/>
    <rect x="14" y="9"   width="2"  height="2"  fill="#F4A4FF"/>
    <rect x="15" y="9"   width="1"  height="1"  fill="#FFD6FF"/>

    <!-- Feet -->
    <rect x="4"  y="15"  width="2"  height="1"  fill="#5C3A6E"/>
    <rect x="4"  y="15"  width="1"  height="1"  fill="#E07CD6"/>
    <rect x="9"  y="15"  width="2"  height="1"  fill="#5C3A6E"/>
    <rect x="10" y="15"  width="1"  height="1"  fill="#E07CD6"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       PHASE 3: Rift foreground energy (over pet edges)
       ═══════════════════════════════════════════════════════ -->
  <g class="rift-root" style="mix-blend-mode: screen;">
    <!-- Thin bright core line -->
    <rect x="7"  y="-22" width="1" height="50" fill="#FFFFFF" opacity="0.15"/>
    <rect x="7"  y="-5"  width="1" height="16" fill="#00D4FF" opacity="0.25"/>
  </g>
</svg>
