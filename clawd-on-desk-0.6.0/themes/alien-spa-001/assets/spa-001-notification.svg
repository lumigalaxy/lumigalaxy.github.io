<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="300" height="300">
  <defs>
    <style>
      .surprise-pop {
        transform-origin: 7.5px 15px;
        animation: surprisePop 0.8s infinite ease-in-out;
      }
      .blink-alert {
        animation: blinkAlert 0.4s infinite step-end;
      }
      @keyframes surprisePop {
        0%, 100% { transform: scale(1, 1); }
        30%      { transform: scale(1.04, 0.96) translate(0, -2px); }
        50%      { transform: scale(0.98, 1.02); }
        70%      { transform: scale(1.02, 0.98); }
      }
      @keyframes blinkAlert {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.3; }
      }
    </style>
  </defs>

  <!-- Shadow -->
  <rect x="3" y="16" width="9" height="1" fill="#000000" opacity="0.35"/>

  <!-- Exclamation mark floating -->
  <rect class="blink-alert" x="12" y="-12" width="1" height="4" fill="#FF4444"/>
  <rect class="blink-alert" x="12" y="-7"  width="1" height="1" fill="#FF4444"/>

  <!-- Character surprised -->
  <g class="surprise-pop">

    <!-- Antennae perked straight up -->
    <rect x="4"  y="-12" width="1" height="10" fill="#5C3A6E"/>
    <rect x="3"  y="-16" width="3" height="4"  fill="#5C3A6E"/>
    <rect x="3"  y="-15" width="2" height="2"  fill="#FF6FB5"/>
    <rect x="3"  y="-15" width="1" height="1"  fill="#FFFFFF"/>

    <rect x="10" y="-9"  width="1" height="7"  fill="#5C3A6E"/>
    <rect x="9"  y="-12" width="3" height="3"  fill="#5C3A6E"/>
    <rect x="9"  y="-11" width="2" height="2"  fill="#FFE55C"/>
    <rect x="9"  y="-11" width="1" height="1"  fill="#FFFFFF"/>

    <rect x="7"  y="-14" width="1" height="1"  fill="#00D4FF"/>

    <!-- Body outline -->
    <rect x="3"  y="-2"  width="9"  height="1"  fill="#5C3A6E"/>
    <rect x="2"  y="-1"  width="11" height="1"  fill="#5C3A6E"/>
    <rect x="1"  y="0"   width="13" height="13" fill="#5C3A6E"/>
    <rect x="2"  y="13"  width="11" height="1"  fill="#5C3A6E"/>
    <rect x="3"  y="14"  width="9"  height="1"  fill="#5C3A6E"/>

    <!-- Body fill -->
    <rect x="3"  y="-1"  width="9"  height="1"  fill="#F4A4FF"/>
    <rect x="2"  y="0"   width="11" height="13" fill="#F4A4FF"/>
    <rect x="3"  y="13"  width="9"  height="1"  fill="#F4A4FF"/>

    <!-- Highlight -->
    <rect x="3"  y="0"   width="3"  height="1"  fill="#FFD6FF"/>
    <rect x="3"  y="1"   width="2"  height="2"  fill="#FFD6FF"/>
    <rect x="3"  y="1"   width="1"  height="1"  fill="#FFFFFF"/>

    <!-- Big surprised eye (wide open) -->
    <rect x="4"  y="3"   width="7"  height="7"  fill="#5C3A6E"/>
    <rect x="5"  y="4"   width="5"  height="5"  fill="#FFFFFF"/>
    <rect x="6"  y="5"   width="3"  height="3"  fill="#2A1A33"/>
    <rect x="7"  y="4"   width="1"  height="1"  fill="#FFFFFF"/>
    <rect x="8"  y="5"   width="1"  height="1"  fill="#FFFFFF"/>

    <!-- Nose -->
    <rect x="7"  y="10"  width="1"  height="1"  fill="#5C3A6E"/>

    <!-- Small o mouth (surprised) -->
    <rect x="6"  y="11"  width="3"  height="1"  fill="#5C3A6E"/>
    <rect x="7"  y="12"  width="1"  height="1"  fill="#5C3A6E"/>

    <!-- Cheek blush (excited) -->
    <rect x="2"  y="7"   width="2"  height="2"  fill="#FF6FB5" opacity="0.6"/>
    <rect x="11" y="7"   width="2"  height="2"  fill="#FF6FB5" opacity="0.6"/>

    <!-- Arms raised in surprise -->
    <rect x="-2" y="5"   width="3"  height="5"  fill="#5C3A6E"/>
    <rect x="-1" y="6"   width="2"  height="4"  fill="#F4A4FF"/>

    <rect x="14" y="5"   width="3"  height="5"  fill="#5C3A6E"/>
    <rect x="14" y="6"   width="2"  height="4"  fill="#F4A4FF"/>

    <!-- Feet -->
    <rect x="4"  y="15"  width="2"  height="1"  fill="#5C3A6E"/>
    <rect x="4"  y="15"  width="1"  height="1"  fill="#E07CD6"/>
    <rect x="9"  y="15"  width="2"  height="1"  fill="#5C3A6E"/>
    <rect x="10" y="15"  width="1"  height="1"  fill="#E07CD6"/>

  </g>
</svg>
