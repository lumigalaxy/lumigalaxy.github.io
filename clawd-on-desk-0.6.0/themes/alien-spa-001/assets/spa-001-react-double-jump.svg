<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="300" height="300">
  <defs>
    <style>
      .bounce {
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation: bounce 1s infinite ease-in-out;
      }
      .shadow-anim {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: shadowPulse 1s infinite ease-in-out;
      }
      .sparkle {
        opacity: 0;
        animation: flash 1.5s infinite step-end;
      }
      .s1 { animation-delay: 0.0s; }
      .s2 { animation-delay: 0.5s; }
      .s3 { animation-delay: 1.0s; }
      @keyframes bounce {
        0%, 15%, 100% { transform: translateY(0) scaleY(1); }
        20%  { transform: translateY(0) scaleY(0.88); }
        40%  { transform: translateY(-9px) scaleY(1.04); }
        50%  { transform: translateY(-11px) scaleY(1); }
        60%  { transform: translateY(-9px) scaleY(1.04); }
        80%  { transform: translateY(0) scaleY(0.88); }
        85%  { transform: translateY(0) scaleY(1); }
      }
      @keyframes shadowPulse {
        0%, 15%, 100% { transform: scale(1);   opacity: 0.4; }
        40%            { transform: scale(0.6); opacity: 0.18; }
        50%            { transform: scale(0.5); opacity: 0.1; }
        60%            { transform: scale(0.6); opacity: 0.18; }
        80%            { transform: scale(1.1); opacity: 0.5; }
      }
      @keyframes flash { 0% { opacity: 0; } 10% { opacity: 1; } 30% { opacity: 0; } 100% { opacity: 0; } }
    </style>
  </defs>

  <!-- Shadow -->
  <rect class="shadow-anim" x="3" y="16" width="9" height="1" fill="#000000"/>

  <!-- Sparkle particles -->
  <rect class="sparkle s1" x="-3" y="-5" width="2" height="2" fill="#FF6FB5"/>
  <rect class="sparkle s2" x="18" y="-2" width="2" height="2" fill="#FFE55C"/>
  <rect class="sparkle s3" x="20" y="8"  width="2" height="2" fill="#00D4FF"/>
  <rect class="sparkle s1" x="-5" y="6"  width="2" height="2" fill="#FF6FB5"/>

  <!-- Character bouncing -->
  <g class="bounce">

    <!-- Asymmetric dual antennae with glowing orbs -->
    <rect x="4"  y="-10" width="1" height="8"  fill="#5C3A6E"/>
    <rect x="3"  y="-14" width="3" height="4"  fill="#5C3A6E"/>
    <rect x="3"  y="-13" width="2" height="2"  fill="#FF6FB5"/>
    <rect x="3"  y="-13" width="1" height="1"  fill="#FFFFFF"/>

    <rect x="10" y="-7"  width="1" height="5"  fill="#5C3A6E"/>
    <rect x="9"  y="-10" width="3" height="3"  fill="#5C3A6E"/>
    <rect x="9"  y="-9"  width="2" height="2"  fill="#FFE55C"/>
    <rect x="9"  y="-9"  width="1" height="1"  fill="#FFFFFF"/>

    <rect x="7"  y="-12" width="1" height="1"  fill="#00D4FF"/>

    <!-- Body outline: round pink blob -->
    <rect x="3"  y="-2"  width="9"  height="1"  fill="#5C3A6E"/>
    <rect x="2"  y="-1"  width="11" height="1"  fill="#5C3A6E"/>
    <rect x="1"  y="0"   width="13" height="13" fill="#5C3A6E"/>
    <rect x="2"  y="13"  width="11" height="1"  fill="#5C3A6E"/>
    <rect x="3"  y="14"  width="9"  height="1"  fill="#5C3A6E"/>

    <!-- Body fill -->
    <rect x="3"  y="-1"  width="9"  height="1"  fill="#F4A4FF"/>
    <rect x="2"  y="0"   width="11" height="13" fill="#F4A4FF"/>
    <rect x="3"  y="13"  width="9"  height="1"  fill="#F4A4FF"/>

    <!-- Highlight sheen -->
    <rect x="3"  y="0"   width="3"  height="1"  fill="#FFD6FF"/>
    <rect x="3"  y="1"   width="2"  height="2"  fill="#FFD6FF"/>
    <rect x="3"  y="1"   width="1"  height="1"  fill="#FFFFFF"/>

    <!-- One big happy cyclops eye (bigger smile shape) -->
    <rect x="4"  y="3"   width="7"  height="7"  fill="#5C3A6E"/>
    <rect x="5"  y="4"   width="5"  height="5"  fill="#FFFFFF"/>
    <rect x="6"  y="5"   width="3"  height="3"  fill="#2A1A33"/>
    <rect x="7"  y="4"   width="1"  height="1"  fill="#FFFFFF"/>
    <rect x="8"  y="5"   width="1"  height="1"  fill="#FFFFFF"/>

    <!-- Tiny nose -->
    <rect x="7"  y="10"  width="1"  height="1"  fill="#5C3A6E"/>

    <!-- BIG happy smile (open mouth) -->
    <rect x="4"  y="11"  width="1"  height="1"  fill="#5C3A6E"/>
    <rect x="5"  y="12"  width="5"  height="1"  fill="#5C3A6E"/>
    <rect x="10" y="11"  width="1"  height="1"  fill="#5C3A6E"/>
    <rect x="6"  y="11"  width="3"  height="1"  fill="#FF6FB5"/>

    <!-- Cheek blush -->
    <rect x="2"  y="7"   width="2"  height="2"  fill="#FF6FB5" opacity="0.6"/>
    <rect x="11" y="7"   width="2"  height="2"  fill="#FF6FB5" opacity="0.6"/>

    <!-- Left arm waving -->
    <rect x="-2" y="7"   width="3"  height="4"  fill="#5C3A6E"/>
    <rect x="-1" y="8"   width="2"  height="3"  fill="#F4A4FF"/>
    <rect x="-1" y="8"   width="1"  height="1"  fill="#FFD6FF"/>

    <!-- Right arm waving -->
    <rect x="14" y="7"   width="3"  height="4"  fill="#5C3A6E"/>
    <rect x="14" y="8"   width="2"  height="3"  fill="#F4A4FF"/>
    <rect x="15" y="8"   width="1"  height="1"  fill="#FFD6FF"/>

    <!-- Feet -->
    <rect x="4"  y="15"  width="2"  height="1"  fill="#5C3A6E"/>
    <rect x="4"  y="15"  width="1"  height="1"  fill="#E07CD6"/>
    <rect x="9"  y="15"  width="2"  height="1"  fill="#5C3A6E"/>
    <rect x="10" y="15"  width="1"  height="1"  fill="#E07CD6"/>

  </g>
</svg>
