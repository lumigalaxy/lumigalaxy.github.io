<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="300" height="300">
  <defs>
    <style>
      @keyframes peekSway {
        0%, 100% { transform: rotate(0deg); }
        40%       { transform: rotate(4deg); }
        70%       { transform: rotate(3deg); }
      }
      @keyframes antennaPerk {
        0%, 100% { transform: rotate(0deg); }
        40%       { transform: rotate(-8deg); }
      }
      @keyframes questionFade {
        0%        { opacity: 0;   transform: translateY(2px); }
        20%       { opacity: 1;   transform: translateY(0px); }
        80%       { opacity: 1;   transform: translateY(0px); }
        100%      { opacity: 0;   transform: translateY(-1px); }
      }
      #eyes-js, #body-js, #shadow-js {
        transition: transform 0.2s ease-out;
      }
      #shadow-js { transform-origin: 7.5px 15px; }
      .peek-body  { animation: peekSway   2.2s ease-in-out infinite; transform-origin: 7.5px 14px; }
      .ant-left   { animation: antennaPerk 2.2s ease-in-out infinite;         transform-origin: 4.5px -10px; }
      .ant-right  { animation: antennaPerk 2.2s ease-in-out infinite reverse;  transform-origin: 10.5px -7px; }
      .q-bubble   { animation: questionFade 2.2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Ground shadow -->
  <g id="shadow-js">
    <rect x="3" y="16" width="9" height="1" fill="#000000" opacity="0.35"/>
  </g>

  <!-- Feet -->
  <rect x="4" y="15" width="2" height="1" fill="#5C3A6E"/>
  <rect x="4" y="15" width="1" height="1" fill="#E07CD6"/>
  <rect x="9" y="15" width="2" height="1" fill="#5C3A6E"/>
  <rect x="10" y="15" width="1" height="1" fill="#E07CD6"/>

  <!-- Question-mark bubble (appears near top-right) -->
  <g class="q-bubble">
    <rect x="14" y="-18" width="5" height="5" fill="#5C3A6E"/>
    <rect x="15" y="-17" width="3" height="3" fill="#FFE55C"/>
    <rect x="16" y="-16" width="1" height="1" fill="#FFFFFF"/>
    <!-- stem of question mark -->
    <rect x="16" y="-13" width="1" height="1" fill="#5C3A6E"/>
    <rect x="16" y="-12" width="1" height="1" fill="#FFE55C"/>
  </g>

  <!-- Body group (JS cursor tracking) -->
  <g id="body-js">
    <g class="peek-body">

      <!-- Left tall antenna -->
      <g class="ant-left">
        <rect x="4"  y="-10" width="1" height="8"  fill="#5C3A6E"/>
        <rect x="3"  y="-14" width="3" height="4"  fill="#5C3A6E"/>
        <rect x="3"  y="-13" width="2" height="2"  fill="#FF6FB5"/>
        <rect x="3"  y="-13" width="1" height="1"  fill="#FFFFFF"/>
      </g>

      <!-- Right short antenna -->
      <g class="ant-right">
        <rect x="10" y="-7"  width="1" height="5"  fill="#5C3A6E"/>
        <rect x="9"  y="-10" width="3" height="3"  fill="#5C3A6E"/>
        <rect x="9"  y="-9"  width="2" height="2"  fill="#FFE55C"/>
        <rect x="9"  y="-9"  width="1" height="1"  fill="#FFFFFF"/>
      </g>

      <!-- Center cyan glow -->
      <rect x="7" y="-12" width="1" height="1" fill="#00D4FF"/>

      <!-- Body outline -->
      <rect x="3"  y="-2"  width="9"  height="1"  fill="#5C3A6E"/>
      <rect x="2"  y="-1"  width="11" height="1"  fill="#5C3A6E"/>
      <rect x="1"  y="0"   width="13" height="13" fill="#5C3A6E"/>
      <rect x="2"  y="13"  width="11" height="1"  fill="#5C3A6E"/>
      <rect x="3"  y="14"  width="9"  height="1"  fill="#5C3A6E"/>

      <!-- Body fill -->
      <rect x="3"  y="-1"  width="9"  height="1"  fill="#F4A4FF"/>
      <rect x="2"  y="0"   width="11" height="13" fill="#F4A4FF"/>
      <rect x="3"  y="13"  width="9"  height="1"  fill="#F4A4FF"/>

      <!-- Highlight sheen -->
      <rect x="3" y="0" width="3" height="1" fill="#FFD6FF"/>
      <rect x="3" y="1" width="2" height="2" fill="#FFD6FF"/>
      <rect x="3" y="1" width="1" height="1" fill="#FFFFFF"/>

      <!-- Eye socket -->
      <rect x="3" y="2" width="9" height="9" fill="#5C3A6E"/>
      <rect x="4" y="3" width="7" height="7" fill="#FFFFFF"/>

      <!-- Nose -->
      <rect x="7" y="10" width="1" height="1" fill="#5C3A6E"/>

      <!-- Curious open mouth -->
      <rect x="6" y="11" width="3" height="2" fill="#5C3A6E"/>
      <rect x="7" y="12" width="1" height="1" fill="#F4A4FF"/>

      <!-- Cheeks (extra rosy from excitement) -->
      <rect x="2"  y="7" width="2" height="2" fill="#FF6FB5" opacity="0.6"/>
      <rect x="11" y="7" width="2" height="2" fill="#FF6FB5" opacity="0.6"/>

      <!-- Left arm (raised slightly in curiosity) -->
      <rect x="-1" y="7" width="3" height="3" fill="#5C3A6E"/>
      <rect x="0"  y="8" width="2" height="2" fill="#F4A4FF"/>

      <!-- Right arm -->
      <rect x="14" y="8" width="3" height="3" fill="#5C3A6E"/>
      <rect x="14" y="9" width="2" height="2" fill="#F4A4FF"/>

    </g>
  </g>

  <!-- Pupil (tracked independently by JS) -->
  <g id="eyes-js">
    <rect x="6" y="5" width="3" height="3" fill="#2A1A33"/>
    <rect x="7" y="4" width="2" height="1" fill="#FFFFFF"/>
  </g>
</svg>
