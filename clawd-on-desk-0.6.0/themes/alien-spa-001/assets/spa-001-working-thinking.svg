<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="300" height="300">
  <defs>
    <style>
      .breathe {
        transform-origin: 7.5px 7px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      .float-q {
        opacity: 0;
        animation: floatQ 2.5s infinite ease-in-out;
      }
      .q1 { animation-delay: 0.0s; }
      .q2 { animation-delay: 1.2s; }
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1); }
        50%       { transform: scale(1.03, 0.97) translate(0, 0.3px); }
      }
      @keyframes floatQ {
        0%   { transform: translate(0, 0) scale(0.6);   opacity: 0; }
        15%  { opacity: 1; }
        80%  { opacity: 0.8; }
        100% { transform: translate(0, -10px) scale(1.2); opacity: 0; }
      }
    </style>
  </defs>

  <!-- Ground shadow -->
  <rect x="3" y="16" width="9" height="1" fill="#000000" opacity="0.35"/>

    <!-- Pixel question marks floating up from head -->
    <!-- Big Q -->
    <g class="float-q q1" transform="translate(2, -6)">
      <rect x="0" y="0" width="3" height="1" fill="#FF6FB5"/>
      <rect x="2" y="1" width="1" height="2" fill="#FF6FB5"/>
      <rect x="1" y="3" width="1" height="1" fill="#FF6FB5"/>
      <rect x="1" y="5" width="1" height="1" fill="#FF6FB5"/>
    </g>
    <!-- Small Q -->
    <g class="float-q q2" transform="translate(10, -8)">
      <rect x="0" y="0" width="2" height="1" fill="#00D4FF"/>
      <rect x="1" y="1" width="1" height="1" fill="#00D4FF"/>
      <rect x="0" y="2" width="1" height="1" fill="#00D4FF"/>
      <rect x="0" y="3" width="2" height="1" fill="#00D4FF"/>
      <rect x="1" y="4" width="1" height="1" fill="#00D4FF"/>
    </g>

  <!-- Character -->
  <g class="breathe">

    <!-- Asymmetric dual antennae (left antenna tilted while thinking) -->
    <rect x="4"  y="-9"  width="1" height="7"  fill="#5C3A6E" transform="rotate(-12, 4, -2)"/>
    <rect x="3"  y="-13" width="3" height="4"  fill="#5C3A6E" transform="rotate(-12, 4, -2)"/>
    <rect x="3"  y="-12" width="2" height="2"  fill="#FF6FB5" transform="rotate(-12, 4, -2)"/>

    <rect x="10" y="-7"  width="1" height="5"  fill="#5C3A6E"/>
    <rect x="9"  y="-10" width="3" height="3"  fill="#5C3A6E"/>
    <rect x="9"  y="-9"  width="2" height="2"  fill="#FFE55C"/>
    <rect x="9"  y="-9"  width="1" height="1"  fill="#FFFFFF"/>

    <!-- Center dot -->
    <rect x="7"  y="-12" width="1" height="1"  fill="#00D4FF"/>

    <!-- Body outline -->
    <rect x="3"  y="-2"  width="9"  height="1"  fill="#5C3A6E"/>
    <rect x="2"  y="-1"  width="11" height="1"  fill="#5C3A6E"/>
    <rect x="1"  y="0"   width="13" height="13" fill="#5C3A6E"/>
    <rect x="2"  y="13"  width="11" height="1"  fill="#5C3A6E"/>
    <rect x="3"  y="14"  width="9"  height="1"  fill="#5C3A6E"/>

    <!-- Body fill -->
    <rect x="3"  y="-1"  width="9"  height="1"  fill="#F4A4FF"/>
    <rect x="2"  y="0"   width="11" height="13" fill="#F4A4FF"/>
    <rect x="3"  y="13"  width="9"  height="1"  fill="#F4A4FF"/>

    <!-- Highlight -->
    <rect x="3"  y="0"   width="3"  height="1"  fill="#FFD6FF"/>
    <rect x="3"  y="1"   width="2"  height="2"  fill="#FFD6FF"/>
    <rect x="3"  y="1"   width="1"  height="1"  fill="#FFFFFF"/>

    <!-- Eye looking up-right (thinking) -->
    <rect x="4"  y="3"   width="7"  height="7"  fill="#5C3A6E"/>
    <rect x="5"  y="4"   width="5"  height="5"  fill="#FFFFFF"/>
    <!-- Pupil shifted up-right -->
    <rect x="7"  y="4"   width="3"  height="3"  fill="#2A1A33"/>
    <rect x="8"  y="4"   width="1"  height="1"  fill="#FFFFFF"/>
    <rect x="9"  y="5"   width="1"  height="1"  fill="#FFFFFF"/>

    <!-- Nose -->
    <rect x="7"  y="10"  width="1"  height="1"  fill="#5C3A6E"/>

    <!-- Thinking mouth (small flat line) -->
    <rect x="6"  y="12"  width="3"  height="1"  fill="#5C3A6E"/>

    <!-- Cheek blush -->
    <rect x="2"  y="7"   width="2"  height="2"  fill="#FF6FB5" opacity="0.4"/>
    <rect x="11" y="7"   width="2"  height="2"  fill="#FF6FB5" opacity="0.4"/>

    <!-- Left hand on chin (thinking pose) -->
    <rect x="0"  y="7"   width="2"  height="4"  fill="#5C3A6E"/>
    <rect x="1"  y="8"   width="1"  height="3"  fill="#F4A4FF"/>

    <!-- Right hand resting -->
    <rect x="13" y="8"   width="3"  height="3"  fill="#5C3A6E"/>
    <rect x="13" y="9"   width="2"  height="2"  fill="#F4A4FF"/>

    <!-- Feet -->
    <rect x="4"  y="15"  width="2"  height="1"  fill="#5C3A6E"/>
    <rect x="4"  y="15"  width="1"  height="1"  fill="#E07CD6"/>
    <rect x="9"  y="15"  width="2"  height="1"  fill="#5C3A6E"/>
    <rect x="10" y="15"  width="1"  height="1"  fill="#E07CD6"/>

  </g>
</svg>
