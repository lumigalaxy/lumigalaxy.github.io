<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* Intense building: fast body bob, all 4 limbs active */
  .body-build {
    transform-origin: 7.5px 13px;
    animation: build-body 0.3s infinite ease-in-out;
  }
  .shadow-build {
    transform-origin: 7.5px 14px;
    animation: build-shadow 0.3s infinite ease-in-out;
  }
  .arm-l-b {
    transform-origin: 1px 5px;
    animation: arm-lb 0.22s infinite ease-in-out;
  }
  .arm-r-b {
    transform-origin: 14px 5px;
    animation: arm-rb 0.18s infinite ease-in-out;
  }
  /* Tips: intense rapid flicker */
  .ft-build {
    transform-origin: 7.5px -1px;
    animation: ft-build 0.35s infinite ease-in-out;
  }
  /* Building blocks assembling above */
  .blk { opacity:0; }
  .b1 { animation: blk-place 2.4s 0.0s infinite ease-out; fill:#FF8800; }
  .b2 { animation: blk-place 2.4s -0.8s infinite ease-out; fill:#FFAA00; }
  .b3 { animation: blk-place 2.4s -1.6s infinite ease-out; fill:#FF6600; }
  /* Lots of sparks */
  .em { opacity:0; }
  .em1 { animation: ferise 1.2s 0.0s infinite linear; }
  .em2 { animation: ferise 1.5s -0.5s infinite linear; }
  .em3 { animation: ferise 1.0s -0.9s infinite linear; }
  .em4 { animation: ferise 1.3s -0.2s infinite linear; }
  .em5 { animation: ferise 1.1s -0.7s infinite linear; }
  .em6 { animation: ferise 1.6s -1.1s infinite linear; }

  @keyframes build-body {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(1.0px); }
  }
  @keyframes build-shadow {
    0%,100% { transform: scaleX(1.02); opacity:.45; }
    50%     { transform: scaleX(1.06); opacity:.52; }
  }
  @keyframes arm-lb {
    0%   { transform: rotate(-10deg); }
    25%  { transform: rotate(-42deg); }
    50%  { transform: rotate(-8deg); }
    75%  { transform: rotate(-38deg); }
    100% { transform: rotate(-10deg); }
  }
  @keyframes arm-rb {
    0%   { transform: rotate(10deg); }
    25%  { transform: rotate(42deg); }
    50%  { transform: rotate(8deg); }
    75%  { transform: rotate(38deg); }
    100% { transform: rotate(10deg); }
  }
  @keyframes ft-build {
    0%,100% { transform: rotate(-7deg) scaleY(1.18); }
    50%     { transform: rotate( 7deg) scaleY(1.25); }
  }
  @keyframes blk-place {
    0%        { opacity:0; transform:translateY(4px); }
    15%       { opacity:1; transform:translateY(0); }
    15%,80%   { opacity:1; transform:translateY(0); }
    90%,100%  { opacity:0; transform:translateY(-2px); }
  }
  @keyframes ferise {
    0%   { opacity:0; transform:translate(0,0); }
    12%  { opacity:.90; }
    86%  { opacity:.35; }
    100% { opacity:0; transform:translate(1px,-13px); }
  }
</style></defs>

<!-- Shadow -->
<rect class="shadow-build" x="3" y="14" width="10" height="1" fill="#FF5522" opacity=".45"/>

<!-- Building blocks assembling above character -->
<g>
  <rect class="blk b1" x="3"  y="-14" width="4" height="3"/>
  <rect class="blk b2" x="8"  y="-14" width="4" height="3"/>
  <rect class="blk b3" x="5"  y="-11" width="5" height="2"/>
</g>

<!-- Heavy embers everywhere -->
<g fill="#FFD080">
  <rect class="em em1" x="3"  y="1"  width="1" height="1"/>
  <rect class="em em2" x="7"  y="0"  width="1" height="1"/>
  <rect class="em em3" x="11" y="2"  width="1" height="1"/>
  <rect class="em em4" x="5"  y="2"  width="1" height="1"/>
  <rect class="em em5" x="9"  y="1"  width="1" height="1"/>
  <rect class="em em6" x="4"  y="-1" width="1" height="1"/>
</g>

<!-- Tips (intense flare) -->
<g class="ft-build">
  <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
  <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
  <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
  <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
  <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
</g>

<!-- Body -->
<g class="body-build">
  <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
  <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
  <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
  <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
  <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
  <rect x="4"  y="9"  width="7" height="1"  fill="#FF7744"/>
  <rect x="5"  y="10" width="5" height="1"  fill="#FF7744"/>
  <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
  <rect x="5"  y="8"  width="5" height="1"  fill="#FFAA66"/>
  <rect x="6"  y="9"  width="3" height="1"  fill="#FFAA66"/>
  <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
  <!-- Eyes: intense determined squint -->
  <rect x="4" y="4" width="2" height="1" fill="#330000"/>
  <rect x="9" y="4" width="2" height="1" fill="#330000"/>
  <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
  <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
  <!-- Arms hammering fast -->
  <g class="arm-l-b" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
  <g class="arm-r-b" fill="#EE4422"><rect x="13" y="5" width="2" height="2"/></g>
</g>
</svg>
