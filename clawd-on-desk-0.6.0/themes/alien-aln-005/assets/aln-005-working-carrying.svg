<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* Body strains slightly under load */
  .body-carry {
    transform-origin: 7.5px 5px;
    animation: carry-body 1.8s infinite ease-in-out;
  }
  .shadow-carry {
    transform-origin: 7.5px 14px;
    animation: carry-shadow 1.8s infinite ease-in-out;
  }
  /* Both arms raised holding the box */
  .arm-l-carry {
    transform-origin: 1px 5px;
    animation: carry-arm-l 1.8s infinite ease-in-out;
  }
  .arm-r-carry {
    transform-origin: 14px 5px;
    animation: carry-arm-r 1.8s infinite ease-in-out;
  }
  /* The carried object bobs with body */
  .cargo {
    transform-origin: 7.5px -2px;
    animation: cargo-bob 1.8s infinite ease-in-out;
  }
  /* Tips: strain-bent slightly back */
  .ft-carry {
    transform-origin: 7.5px -1px;
    animation: ft-carry 1.8s infinite ease-in-out;
  }

  @keyframes carry-body {
    0%,100% { transform: scaleY(0.97) translateY(0.5px); }
    50%     { transform: scaleY(0.95) translateY(1.0px); }
  }
  @keyframes carry-shadow {
    0%,100% { transform: scaleX(1.05); opacity:.50; }
    50%     { transform: scaleX(1.08); opacity:.55; }
  }
  @keyframes carry-arm-l {
    0%,100% { transform: rotate(55deg); }
    50%     { transform: rotate(60deg); }
  }
  @keyframes carry-arm-r {
    0%,100% { transform: rotate(-55deg); }
    50%     { transform: rotate(-60deg); }
  }
  @keyframes cargo-bob {
    0%,100% { transform: translateY(0px); }
    50%     { transform: translateY(0.5px); }
  }
  @keyframes ft-carry {
    0%,100% { transform: rotate(-3deg) scaleY(0.90); }
    50%     { transform: rotate(-4deg) scaleY(0.85); }
  }
</style></defs>

<!-- Shadow (wider — carrying something) -->
<rect class="shadow-carry" x="2" y="14" width="11" height="1" fill="#FF5522" opacity=".45"/>

<!-- Carried cargo: glowing fire orb / data package -->
<g class="cargo">
  <!-- Outer box glow -->
  <rect x="3"  y="-12" width="9" height="7" fill="#FF6600" opacity=".35"/>
  <!-- Box body -->
  <rect x="4"  y="-11" width="7" height="5" fill="#FF8800"/>
  <rect x="5"  y="-10" width="5" height="3" fill="#FFCC44"/>
  <rect x="6"  y="-9"  width="3" height="1" fill="#FFEE88"/>
</g>

<!-- Tips (strained back) -->
<g class="ft-carry">
  <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
  <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
  <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
  <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
  <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
</g>

<!-- Body -->
<g class="body-carry">
  <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
  <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
  <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
  <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
  <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
  <rect x="4"  y="9"  width="7" height="1"  fill="#FF7744"/>
  <rect x="5"  y="10" width="5" height="1"  fill="#FF7744"/>
  <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
  <rect x="5"  y="8"  width="5" height="1"  fill="#FFAA66"/>
  <rect x="6"  y="9"  width="3" height="1"  fill="#FFAA66"/>
  <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
  <!-- Eyes: strained upward look -->
  <rect x="4" y="3" width="2" height="1" fill="#330000"/>
  <rect x="9" y="3" width="2" height="1" fill="#330000"/>
  <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
  <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
  <!-- Arms raised to carry -->
  <g class="arm-l-carry" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
  <g class="arm-r-carry" fill="#EE4422"><rect x="13" y="5" width="2" height="2"/></g>
</g>
</svg>
