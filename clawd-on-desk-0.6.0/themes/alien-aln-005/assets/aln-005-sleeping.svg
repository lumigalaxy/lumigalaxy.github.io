<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* Melted flame body — slow breathing squash */
  .breathe {
    transform-origin: 7.5px 14px;
    animation: sleep-squash 4.5s infinite ease-in-out;
  }
  .shadow-breathe {
    transform-origin: 7.5px 15px;
    animation: shadow-pulse 4.5s infinite ease-in-out;
  }
  .z-particle { opacity:0; }
  .z1 { animation: float-1 6s infinite ease-in-out; animation-delay: 0s; }
  .z2 { animation: float-2 6s infinite ease-in-out; animation-delay: 2s; }
  .z3 { animation: float-3 6s infinite ease-in-out; animation-delay: 4s; }

  @keyframes sleep-squash {
    0%,80%,100% { transform: scale(1,1); }
    30%,40%     { transform: scale(1.03,1.15); }
  }
  @keyframes shadow-pulse {
    0%,80%,100% { transform: scaleX(1); opacity:.45; }
    30%,40%     { transform: scaleX(1.06); opacity:.55; }
  }
  @keyframes float-1 {
    0%   { transform: translate(5px,6px) scale(0.4); opacity:0; }
    10%  { opacity:1; }
    30%  { transform: translate(9px,2px) scale(0.6); }
    50%  { transform: translate(4px,-2px) scale(0.8); }
    70%  { transform: translate(8px,-6px) scale(1.0); }
    90%  { opacity:0.8; }
    100% { transform: translate(6px,-10px) scale(1.1); opacity:0; }
  }
  @keyframes float-2 {
    0%   { transform: translate(8px,7px) scale(0.3); opacity:0; }
    10%  { opacity:1; }
    30%  { transform: translate(5px,3px) scale(0.5); }
    50%  { transform: translate(9px,-1px) scale(0.7); }
    70%  { transform: translate(6px,-5px) scale(0.9); }
    90%  { opacity:0.8; }
    100% { transform: translate(8px,-9px) scale(1.0); opacity:0; }
  }
  @keyframes float-3 {
    0%   { transform: translate(6px,5px) scale(0.5); opacity:0; }
    10%  { opacity:1; }
    30%  { transform: translate(9px,1px) scale(0.7); }
    50%  { transform: translate(4px,-3px) scale(0.9); }
    70%  { transform: translate(8px,-7px) scale(1.1); }
    90%  { opacity:0.8; }
    100% { transform: translate(5px,-11px) scale(1.2); opacity:0; }
  }
</style>

<!-- Pixel-art Z definitions (reuse clawd-compatible format) -->
<g id="pixel-z">
  <rect x="0" y="0" width="4" height="1"/>
  <rect x="2" y="1" width="1" height="1"/>
  <rect x="1" y="2" width="1" height="1"/>
  <rect x="0" y="3" width="4" height="1"/>
</g>
<g id="pixel-z-small">
  <rect x="0" y="0" width="3" height="1"/>
  <rect x="1" y="1" width="1" height="1"/>
  <rect x="0" y="2" width="3" height="1"/>
</g>
</defs>

<!-- Wide ground shadow (melted wider footprint) -->
<rect class="shadow-breathe" x="-1" y="14" width="17" height="1" fill="#CC3300" opacity=".40"/>

<!-- Floating Zzz -->
<g class="zzz-particles" fill="#FF8844">
  <use href="#pixel-z"       class="z-particle z1"/>
  <use href="#pixel-z-small" class="z-particle z2"/>
  <use href="#pixel-z"       class="z-particle z3"/>
</g>

<!-- Melted / splooted flame body -->
<g class="breathe">
  <!-- Drooped tip stubs (barely visible, flattened sideways) -->
  <rect x="4"  y="9"  width="2" height="1" fill="#CC3311" opacity=".7"/>
  <rect x="9"  y="9"  width="2" height="1" fill="#CC3311" opacity=".7"/>
  <rect x="6"  y="8"  width="3" height="1" fill="#CC3311" opacity=".7"/>

  <!-- Flattened outer body (spread wide) -->
  <rect x="1"  y="10" width="13" height="4" fill="#DD4422"/>
  <rect x="0"  y="11" width="15" height="2" fill="#EE4422"/>
  <rect x="2"  y="14" width="11" height="1" fill="#DD4422"/>

  <!-- Flat arms at sides -->
  <rect x="-1" y="12" width="2"  height="1" fill="#EE4422"/>
  <rect x="14" y="12" width="2"  height="1" fill="#EE4422"/>

  <!-- Inner layers (still layered for depth) -->
  <rect x="3"  y="10" width="9"  height="4" fill="#FF7744"/>
  <rect x="5"  y="10" width="5"  height="4" fill="#FFAA66"/>

  <!-- Sleeping eye dashes -->
  <rect x="4"  y="12" width="2"  height="0.6" fill="#220000"/>
  <rect x="9"  y="12" width="2"  height="0.6" fill="#220000"/>

  <!-- Blush (softer while sleeping) -->
  <rect x="3"  y="12" width="2"  height="1" fill="#FF9999" opacity=".50"/>
  <rect x="10" y="12" width="2"  height="1" fill="#FF9999" opacity=".50"/>
</g>
</svg>
