<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* 6s one-shot: flinch → lean away + block → hold → sigh → return */
  .body-react { transform-origin:7.5px 5px; animation:body-ann 6s 1 ease-in-out forwards; }
  .arm-l-react { transform-origin:1px 5px; animation:arm-l-ann 6s 1 ease-in-out forwards; }
  .eyes-react { transform-origin:7.5px 4px; animation:eyes-ann 6s 1 ease-in-out forwards; }
  .ft-react { transform-origin:7.5px -1px; animation:ft-ann 6s 1 ease-in-out forwards; }
  .shadow-react { transform-origin:7.5px 14px; animation:shadow-ann 6s 1 ease-in-out forwards; }
  .qmark { opacity:0; transform-origin:7px -2px; animation:qmark-ann 6s 1 ease-out forwards; }
  .sigh { opacity:0; transform-origin:15px 6px; animation:sigh-ann 6s 1 ease-out forwards; }

  @keyframes body-ann {
    0%        { transform: translate(0,0) scale(1,1); }
    4%        { transform: translate(0,1.5px) scale(1,1); }
    14%       { transform: translate(2px,0) scale(1,1); }
    35%       { transform: translate(2px,0) scale(1,1); }
    42%       { transform: translate(1.5px,-0.5px) scale(1,1.01); }
    48%       { transform: translate(1px,1px) scale(1.03,0.97); }
    70%       { transform: translate(0.3px,0.3px) scale(1,1); }
    86%,100%  { transform: translate(0,0) scale(1,1); }
  }
  @keyframes arm-l-ann {
    0%,6%     { transform: rotate(0deg); }
    14%       { transform: rotate(-50deg); }
    35%       { transform: rotate(-45deg); }
    44%       { transform: rotate(-15deg); }
    50%,100%  { transform: rotate(0deg); }
  }
  @keyframes eyes-ann {
    0%        { transform: scaleY(1); }
    3%        { transform: scaleY(0.2); }
    6%        { transform: scaleY(0.55); }
    14%,35%   { transform: scaleY(0.50); }
    40%       { transform: scaleY(0.1); }
    46%       { transform: scaleY(0.55); }
    68%       { transform: scaleY(0.55); }
    74%       { transform: scaleY(0.1); }
    78%,100%  { transform: scaleY(1); }
  }
  @keyframes ft-ann {
    0%,6%     { transform: rotate(0deg) scaleY(1); }
    14%,35%   { transform: rotate(-4deg) scaleY(0.85); }
    50%,100%  { transform: rotate(0deg) scaleY(1); }
  }
  @keyframes shadow-ann {
    0%        { transform: translate(0,0) scaleX(1); opacity:.45; }
    14%       { transform: translate(1px,0) scaleX(1); opacity:.45; }
    46%       { transform: translate(0.5px,0) scaleX(1.05); opacity:.52; }
    86%,100%  { transform: translate(0,0) scaleX(1); opacity:.45; }
  }
  @keyframes qmark-ann {
    0%,4%    { opacity:0; transform: translate(0,4px) scale(0.5); }
    10%      { opacity:1; transform: translate(0,0) scale(1.1); }
    14%,26%  { opacity:1; transform: translate(0,0) scale(1); }
    34%,100% { opacity:0; transform: translate(0,-3px) scale(1.1); }
  }
  @keyframes sigh-ann {
    0%,37%   { opacity:0; transform: translate(0,1px) scale(0.3); }
    43%      { opacity:0.6; transform: translate(0,0) scale(0.8); }
    50%      { opacity:0.6; transform: translate(1px,0) scale(1); }
    62%,100% { opacity:0; transform: translate(4px,-4px) scale(1.3); }
  }
</style>
<g id="pixel-question">
  <rect x="1" y="0" width="2" height="1"/>
  <rect x="0" y="1" width="1" height="1"/>
  <rect x="3" y="1" width="1" height="2"/>
  <rect x="2" y="3" width="1" height="1"/>
  <rect x="1" y="4" width="1" height="1"/>
  <rect x="1" y="6" width="1" height="1"/>
</g>
</defs>

<rect class="shadow-react" x="3" y="14" width="10" height="1" fill="#FF5522" opacity=".45"/>

<!-- Tips -->
<g class="ft-react">
  <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
  <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
  <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
  <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
  <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
</g>

<!-- Body -->
<g class="body-react">
  <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
  <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
  <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
  <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
  <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
  <rect x="4"  y="9"  width="7" height="1"  fill="#FF7744"/>
  <rect x="5"  y="10" width="5" height="1"  fill="#FF7744"/>
  <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
  <rect x="5"  y="8"  width="5" height="1"  fill="#FFAA66"/>
  <rect x="6"  y="9"  width="3" height="1"  fill="#FFAA66"/>
  <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
  <g class="eyes-react" fill="#330000">
    <rect x="4" y="3" width="2" height="2"/>
    <rect x="9" y="3" width="2" height="2"/>
  </g>
  <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
  <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
  <g class="arm-l-react" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
  <rect fill="#EE4422"                      x="13" y="5" width="2" height="2"/>
  <!-- Sigh puff -->
  <g class="sigh" fill="#FFD4A0" opacity=".7">
    <rect x="14" y="6"  width="2" height="1"/>
    <rect x="15" y="5"  width="2" height="1"/>
    <rect x="16" y="4"  width="2" height="1"/>
  </g>
</g>

<!-- Question mark -->
<g class="qmark" fill="#FF8800">
  <use href="#pixel-question" transform="translate(7,-8)"/>
</g>
</svg>
