<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* 12s thinking cycle: mostly still, one gentle ponder */
  .body-master {
    transform-origin: 7.5px 5px;
    animation: body-think 12s infinite ease-in-out;
  }
  .breathe {
    transform-origin: 7.5px 5px;
    animation: fbrth 3.2s infinite ease-in-out;
  }
  .shadow-think {
    transform-origin: 7.5px 14px;
    animation: shadow-think 12s infinite ease-in-out;
  }
  /* Right arm raised to chin — pensive pose */
  .arm-r-think {
    transform-origin: 14px 5px;
    animation: arm-r-think 12s infinite ease-in-out;
  }
  .arm-l-think {
    transform-origin: 1px 5px;
    animation: arm-l-think 12s infinite ease-in-out;
  }
  .eyes-think {
    transform-origin: 7.5px 4px;
    animation: eyes-think 12s infinite ease-in-out;
  }
  /* Tips: slow meditative sway */
  .ft-think {
    transform-origin: 7.5px -1px;
    animation: ft-think 4s infinite ease-in-out;
  }
  /* Thinking bubble morph */
  .bubble-main { animation: morph-main 6s infinite ease-in-out; }
  /* Loading dots */
  .dot { opacity:0; }
  .d1 { animation: load-dot 2s infinite; }
  .d2 { animation: load-dot 2s infinite; animation-delay: 0.35s; }
  .d3 { animation: load-dot 2s infinite; animation-delay: 0.70s; }
  /* Embers: slow while thinking */
  .em { opacity:0; }
  .em1 { animation: ferise 3.5s 0.0s infinite linear; }
  .em2 { animation: ferise 4.0s -1.8s infinite linear; }

  @keyframes body-think {
    0%,35%,80%,100% { transform: rotate(0deg) translate(0,0); }
    50%             { transform: rotate(1.5deg) translate(0.3px,0); }
  }
  @keyframes shadow-think {
    0%,35%,80%,100% { transform: translate(0,0) scaleX(1); opacity:.45; }
    50%             { transform: translate(0.3px,0) scaleX(1); opacity:.45; }
  }
  @keyframes fbrth {
    0%,100% { transform: scaleX(1) scaleY(1) translateY(0px); }
    50%     { transform: scaleX(1.02) scaleY(0.98) translateY(0.4px); }
  }
  @keyframes arm-r-think {
    0%,38%,75%,100% { transform: rotate(-110deg); }
    52%             { transform: rotate(-118deg); }
    62%             { transform: rotate(-107deg); }
  }
  @keyframes arm-l-think {
    0%,40%,78%,100% { transform: rotate(18deg); }
    55%             { transform: rotate(22deg); }
  }
  @keyframes eyes-think {
    0%   { transform: translate(0.5px,-0.3px) scaleY(1); }
    14%  { transform: translate(0.5px,-0.3px) scaleY(1); }
    16%  { transform: translate(0.5px,-0.3px) scaleY(0.1); }
    18%  { transform: translate(0.5px,-0.3px) scaleY(1); }
    42%  { transform: translate(0.5px,-0.3px) scaleY(1); }
    44%  { transform: translate(0.5px,-0.3px) scaleY(0.1); }
    46%  { transform: translate(0.5px,-0.3px) scaleY(1); }
    56%  { transform: translate(-0.5px,0) scaleY(1); }
    74%  { transform: translate(-0.5px,0) scaleY(1); }
    76%  { transform: translate(-0.5px,0) scaleY(0.1); }
    78%  { transform: translate(-0.5px,0) scaleY(1); }
    88%  { transform: translate(0.5px,-0.3px) scaleY(1); }
    100% { transform: translate(0.5px,-0.3px) scaleY(1); }
  }
  @keyframes ft-think {
    0%,100% { transform: rotate(0deg) scaleY(1.0); }
    50%     { transform: rotate(2deg) scaleY(1.05); }
  }
  @keyframes morph-main {
    0%,100% { transform: translate(0,0); }
    50%     { transform: translate(0,-0.3px); }
  }
  @keyframes load-dot {
    0%,20%  { opacity:0; }
    21%,80% { opacity:1; }
    81%,100%{ opacity:0; }
  }
  @keyframes ferise {
    0%   { opacity:0; transform:translate(0,0); }
    12%  { opacity:.60; }
    86%  { opacity:.20; }
    100% { opacity:0; transform:translate(1px,-14px); }
  }
</style></defs>

<!-- Thinking bubble (upper-left) -->
<g transform="translate(-4, -7)">
  <g class="bubble-main" fill="#FFFFFF" opacity="0.9">
    <rect x="2" y="1" width="8" height="7"/>
    <rect x="1" y="2" width="10" height="5"/>
    <rect x="3" y="0" width="6" height="9"/>
    <!-- Bubble tail toward character -->
    <rect x="9" y="7" width="2" height="2"/>
    <rect x="11" y="9" width="1" height="1"/>
  </g>
  <!-- Flame-orange dots -->
  <g fill="#FF6600">
    <rect class="dot d1" x="2.5" y="4" width="1" height="1"/>
    <rect class="dot d2" x="5.5" y="4" width="1" height="1"/>
    <rect class="dot d3" x="8.5" y="4" width="1" height="1"/>
  </g>
</g>

<!-- Mirrored character (faces left toward bubble) -->
<g transform="translate(15, 0) scale(-1, 1)">
  <rect class="shadow-think" x="3" y="14" width="10" height="1" fill="#FF5522" opacity=".45"/>

  <!-- Slow embers -->
  <g fill="#FFD080">
    <rect class="em em1" x="6" y="2" width="1" height="1"/>
    <rect class="em em2" x="9" y="1" width="1" height="1"/>
  </g>

  <!-- Tips -->
  <g class="ft-think">
    <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
    <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
    <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
    <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
    <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
    <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
    <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
  </g>

  <g class="body-master">
    <g class="breathe">
      <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
      <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
      <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
      <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
      <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
      <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
      <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
      <rect x="4"  y="9"  width="7" height="1"  fill="#FF7744"/>
      <rect x="5"  y="10" width="5" height="1"  fill="#FF7744"/>
      <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
      <rect x="5"  y="8"  width="5" height="1"  fill="#FFAA66"/>
      <rect x="6"  y="9"  width="3" height="1"  fill="#FFAA66"/>
      <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
      <!-- Arms -->
      <g class="arm-l-think" fill="#EE4422"><rect x="0"  y="5" width="3" height="2"/></g>
      <g class="arm-r-think" fill="#EE4422"><rect x="13" y="5" width="2" height="2"/></g>
      <!-- Eyes -->
      <g class="eyes-think" fill="#330000">
        <rect x="4" y="3" width="2" height="2"/>
        <rect x="9" y="3" width="2" height="2"/>
        <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
        <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
      </g>
      <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
      <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    </g>
  </g>
</g>
</svg>
