<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* Slide in from edge, settle, then idle */
  .enter-body {
    transform-origin: 7.5px 5px;
    animation: enter-slide 0.8s ease-out forwards, fbrth 3.2s 0.8s infinite ease-in-out;
  }
  .enter-tips {
    transform-origin: 7.5px -1px;
    animation: enter-tips 0.8s ease-out forwards, ftwave 1.6s 0.8s infinite ease-in-out;
  }
  .enter-eyes {
    transform-origin: 7.5px 4px;
    animation: fblink 4.5s 0.8s infinite ease-in-out;
  }

  @keyframes enter-slide {
    0%   { transform:translateX(20px); opacity:0; }
    40%  { transform:translateX(-1px); opacity:1; }
    70%  { transform:translateX(0.5px); }
    100% { transform:translateX(0); opacity:1; }
  }
  @keyframes enter-tips {
    0%   { transform:rotate(20deg) scaleY(0.7); }
    100% { transform:rotate(0deg) scaleY(1); }
  }
  @keyframes fbrth {
    0%,100% { transform:scaleX(1) scaleY(1) translateY(0); }
    50%     { transform:scaleX(1.02) scaleY(0.98) translateY(0.4px); }
  }
  @keyframes ftwave {
    0%,100% { transform:rotate(0deg) scaleY(1); }
    35%     { transform:rotate(-3deg) scaleY(1.06); }
    70%     { transform:rotate(2deg) scaleY(0.96); }
  }
  @keyframes fblink {
    0%,8%,100% { transform:scaleY(1); }
    3%         { transform:scaleY(0.07); }
    5%         { transform:scaleY(1); }
    6%         { transform:scaleY(0.07); }
  }
</style></defs>

<g transform="rotate(-12, 7.5, 15)">
  <g class="enter-tips">
    <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
    <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
    <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
    <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
    <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
    <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
    <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
  </g>

  <rect x="5" y="11" width="1" height="2" fill="#DD3D1E"/>
  <rect x="9" y="11" width="1" height="2" fill="#DD3D1E"/>

  <g class="enter-body">
    <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
    <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
    <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
    <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
    <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
    <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
    <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
    <g class="enter-eyes" fill="#330000">
      <rect x="4" y="3" width="2" height="2"/>
      <rect x="9" y="3" width="2" height="2"/>
      <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
      <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
    </g>
    <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    <rect x="-1" y="5"  width="3" height="2" fill="#EE4422"/>
    <rect x="13" y="5"  width="2" height="2" fill="#EE4422"/>
  </g>
</g>
</svg>
