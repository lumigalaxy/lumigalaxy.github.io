<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" shape-rendering="crispEdges">
<defs><style>
  /* Collapse (0-1.2s) → melt into sleeping pose → sleep breathe loop */

  .rest-shadow {
    transform-origin: 7.5px 14px;
    animation: rest-shadow 1.2s linear forwards, sleep-shadow 4.5s infinite ease-in-out 1.2s;
  }
  .rest-body {
    transform-origin: 7.5px 5px;
    animation: rest-body 1.2s linear forwards;
  }
  .rest-breathe {
    transform-origin: 7.5px 14px;
    animation: sleep-squash 4.5s infinite ease-in-out 1.2s;
  }
  .rest-tips {
    transform-origin: 7.5px -1px;
    animation: tips-droop 1.2s ease-in forwards;
  }
  .rest-arm-l {
    transform-origin: 1px 5px;
    animation: arm-l-melt 1.2s ease-in forwards;
  }
  .rest-arm-r {
    transform-origin: 14px 5px;
    animation: arm-r-melt 1.2s ease-in forwards;
  }
  .rest-eyes {
    transform-origin: 7.5px 4px;
    animation: eyes-close 1.2s ease-in forwards;
  }

  .z-particle { opacity:0; }
  .z1 { animation: float-1 6s infinite ease-in-out 1.2s; }
  .z2 { animation: float-2 6s infinite ease-in-out 3.2s; }
  .z3 { animation: float-3 6s infinite ease-in-out 5.2s; }

  @keyframes rest-shadow {
    0%   { transform: scaleX(0.60); opacity:.45; }
    100% { transform: scaleX(1.0);  opacity:.42; }
  }
  @keyframes sleep-shadow {
    0%,80%,100% { transform: scaleX(1.0); opacity:.42; }
    30%,40%     { transform: scaleX(1.06); opacity:.52; }
  }
  @keyframes rest-body {
    0%   { transform: scaleX(1)    scaleY(1)    translateY(0px); }
    40%  { transform: scaleX(1.05) scaleY(0.90) translateY(1.0px); }
    70%  { transform: scaleX(1.12) scaleY(0.78) translateY(2.5px); }
    100% { transform: scaleX(1.18) scaleY(0.65) translateY(4.2px); }
  }
  @keyframes sleep-squash {
    0%,80%,100% { transform: scale(1,1); }
    30%,40%     { transform: scale(1.03,1.15); }
  }
  @keyframes tips-droop {
    0%   { transform: rotate(0deg) scaleY(1.0); }
    60%  { transform: rotate(0deg) scaleY(0.5); }
    100% { transform: rotate(0deg) scaleY(0.1); }
  }
  @keyframes arm-l-melt {
    0%   { transform: rotate(0deg) translate(0,0); }
    100% { transform: rotate(0deg) translate(-1px,4px); }
  }
  @keyframes arm-r-melt {
    0%   { transform: rotate(0deg) translate(0,0); }
    100% { transform: rotate(0deg) translate(1px,4px); }
  }
  @keyframes eyes-close {
    0%   { transform: scaleY(1); }
    40%  { transform: scaleY(0.1); }
    100% { transform: scaleY(0.1); }
  }
  @keyframes float-1 {
    0%   { transform: translate(5px,6px) scale(0.4); opacity:0; }
    10%  { opacity:1; }
    30%  { transform: translate(9px,2px) scale(0.6); }
    50%  { transform: translate(4px,-2px) scale(0.8); }
    70%  { transform: translate(8px,-6px) scale(1.0); }
    90%  { opacity:0.8; }
    100% { transform: translate(6px,-10px) scale(1.1); opacity:0; }
  }
  @keyframes float-2 {
    0%   { transform: translate(8px,7px) scale(0.3); opacity:0; }
    10%  { opacity:1; }
    50%  { transform: translate(9px,-1px) scale(0.7); }
    90%  { opacity:0.8; }
    100% { transform: translate(8px,-9px) scale(1.0); opacity:0; }
  }
  @keyframes float-3 {
    0%   { transform: translate(6px,5px) scale(0.5); opacity:0; }
    10%  { opacity:1; }
    50%  { transform: translate(4px,-3px) scale(0.9); }
    90%  { opacity:0.8; }
    100% { transform: translate(5px,-11px) scale(1.2); opacity:0; }
  }
</style>
<g id="pixel-z">
  <rect x="0" y="0" width="4" height="1"/>
  <rect x="2" y="1" width="1" height="1"/>
  <rect x="1" y="2" width="1" height="1"/>
  <rect x="0" y="3" width="4" height="1"/>
</g>
<g id="pixel-z-small">
  <rect x="0" y="0" width="3" height="1"/>
  <rect x="1" y="1" width="1" height="1"/>
  <rect x="0" y="2" width="3" height="1"/>
</g>
</defs>

<rect class="rest-shadow" x="-1" y="14" width="17" height="1" fill="#CC3300" opacity=".40"/>

<g fill="#FF8844">
  <use href="#pixel-z"       class="z-particle z1"/>
  <use href="#pixel-z-small" class="z-particle z2"/>
  <use href="#pixel-z"       class="z-particle z3"/>
</g>

<!-- Tips droop away -->
<g class="rest-tips">
  <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
  <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
  <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
  <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
  <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
</g>

<!-- Body melting down (collapse transition) -->
<g class="rest-body">
  <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
  <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
  <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
  <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
  <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
  <rect x="4"  y="9"  width="7" height="1"  fill="#FF7744"/>
  <rect x="5"  y="10" width="5" height="1"  fill="#FF7744"/>
  <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
  <rect x="5"  y="8"  width="5" height="1"  fill="#FFAA66"/>
  <rect x="6"  y="9"  width="3" height="1"  fill="#FFAA66"/>
  <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
  <g class="rest-arm-l" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
  <g class="rest-arm-r" fill="#EE4422"><rect x="13" y="5" width="2" height="2"/></g>
  <g class="rest-eyes" fill="#330000">
    <rect x="4" y="3" width="2" height="2"/>
    <rect x="9" y="3" width="2" height="2"/>
  </g>
  <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
  <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
</g>

<!-- Sleep-breathing body (appears after collapse, infinite) -->
<g class="rest-breathe" style="opacity:0; animation: fade-in 0.1s 1.2s forwards, sleep-squash 4.5s infinite 1.2s ease-in-out;">
</g>
</svg>
