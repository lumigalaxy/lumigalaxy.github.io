<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* JS-controlled IDs — transition only, NO animation on these elements */
  #eyes-js, #body-js, #shadow-js { transition: transform 0.2s ease-out; }
  #shadow-js { transform-origin: 7.5px 14px; }

  /* CSS animations live on CHILD groups, never on the JS-id elements */
  .ft  { transform-origin: 7.5px -1px; animation: ftwave 1.4s infinite ease-in-out; }
  .fb  { transform-origin: 7.5px 5px;  animation: fbrth  2.8s infinite ease-in-out; }
  .fe  { transform-origin: 7.5px 4px;  animation: fblink 4.5s infinite ease-in-out; }
  .fsh { transform-origin: 7.5px 14px; animation: fsglow 2.8s infinite ease-in-out; }
  /* Embers */
  .em  { opacity:0; }
  .em1 { animation: ferise 2.3s  0.0s  infinite linear; }
  .em2 { animation: ferise 2.8s -1.1s  infinite linear; }
  .em3 { animation: ferise 2.0s -1.7s  infinite linear; }
  .em4 { animation: ferise 2.5s -0.5s  infinite linear; }

  @keyframes ftwave {
    0%,100% { transform: rotate(  0deg) scaleY(1.00); }
    35%     { transform: rotate(-4deg) scaleY(1.08); }
    70%     { transform: rotate( 3deg) scaleY(0.94); }
  }
  @keyframes fbrth {
    0%,100% { transform: scaleX(1.00) scaleY(1.00) translateY( 0.0px); }
    30%     { transform: scaleX(1.02) scaleY(0.98) translateY( 0.3px); }
    60%     { transform: scaleX(0.99) scaleY(1.01) translateY( 0.0px); }
    80%     { transform: scaleX(1.01) scaleY(1.00) translateY(-0.2px); }
  }
  @keyframes fblink {
    0%,8%,100% { transform: scaleY(1.00); }
    3%         { transform: scaleY(0.07); }
    5%         { transform: scaleY(1.00); }
    6%         { transform: scaleY(0.07); }
  }
  @keyframes fsglow {
    0%,100% { transform: scaleX(1.0); opacity:.40; }
    50%     { transform: scaleX(1.10); opacity:.55; }
  }
  @keyframes ferise {
    0%   { opacity:0; transform:translate(0px,0px);   }
    12%  { opacity:.80; }
    86%  { opacity:.25; }
    100% { opacity:0; transform:translate(1px,-16px); }
  }
</style></defs>

<!-- Shadow — JS stretches this, CSS pulses inside child -->
<g id="shadow-js">
  <g class="fsh">
    <rect x="3" y="14" width="10" height="1" fill="#FF5522" opacity=".45"/>
    <rect x="5" y="15" width="6"  height="1" fill="#FF3300" opacity=".20"/>
  </g>
</g>

<!-- Embers (not JS-tracked) -->
<g fill="#FFD080">
  <rect class="em em1" x="5"  y="2"  width="1" height="1"/>
  <rect class="em em2" x="9"  y="3"  width="1" height="1"/>
  <rect class="em em3" x="7"  y="1"  width="1" height="1"/>
  <rect class="em em4" x="11" y="4"  width="1" height="1"/>
</g>

<!-- Tips (not JS-tracked) -->
<g class="ft">
  <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
  <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
  <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
  <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
  <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
</g>

<!-- Body — JS shifts this for counter-motion; breathe is on child .fb -->
<g id="body-js">
  <g class="fb">
    <!-- Outer coral-red, rounded bottom -->
    <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
    <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
    <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
    <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
    <!-- Legs -->
    <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
    <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
    <!-- Mid orange -->
    <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
    <rect x="4"  y="9"  width="7" height="1"  fill="#FF7744"/>
    <rect x="5"  y="10" width="5" height="1"  fill="#FF7744"/>
    <!-- Inner peach -->
    <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
    <rect x="5"  y="8"  width="5" height="1"  fill="#FFAA66"/>
    <rect x="6"  y="9"  width="3" height="1"  fill="#FFAA66"/>
    <!-- Core cream -->
    <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
    <!-- Eyes — JS translates this group; blink is on child .fe -->
    <g id="eyes-js">
      <g class="fe" fill="#330000">
        <rect x="4" y="3" width="2" height="2"/>
        <rect x="9" y="3" width="2" height="2"/>
        <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
        <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
      </g>
    </g>
    <!-- Blush -->
    <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
    <!-- Arms -->
    <rect x="0"  y="5"  width="2" height="2" fill="#EE4422"/>
    <rect x="13" y="5"  width="2" height="2" fill="#EE4422"/>
  </g>
</g>
</svg>
