<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* JS-controlled IDs — transition only */
  #eyes-js, #body-js { transition: transform 0.2s ease-out; }

  .breathe-anim { transform-origin: 7.5px 5px; animation: fbrth   3.2s infinite ease-in-out; }
  .eyes-read    {                               animation: read-code 1.2s infinite; }
  .arm-l-type   { transform-origin: 1px 5px;   animation: type-l   0.15s infinite ease-in-out; }
  .arm-r-type   { transform-origin: 14px 5px;  animation: type-r   0.12s infinite ease-in-out; }
  .ft-type      { transform-origin: 7.5px -1px; animation: ft-type  0.7s infinite ease-in-out; }

  @keyframes fbrth {
    0%,100% { transform: scaleX(1) scaleY(1) translateY(0); }
    50%     { transform: scaleX(1.02) scaleY(0.98) translateY(0.4px); }
  }
  @keyframes read-code {
    0%,14%   { transform: translate(-1.5px,0); }
    15%,29%  { transform: translate(-1px,0); }
    30%,44%  { transform: translate(-0.5px,0); }
    45%,84%  { transform: translate(0,0); }
    85%,100% { transform: translate(-1.5px,0); }
  }
  @keyframes type-l {
    0%   { transform: rotate(-8deg); }
    25%  { transform: rotate(-32deg); }
    50%  { transform: rotate(-10deg); }
    75%  { transform: rotate(-28deg); }
    100% { transform: rotate(-8deg); }
  }
  @keyframes type-r {
    0%   { transform: rotate(8deg); }
    25%  { transform: rotate(32deg); }
    50%  { transform: rotate(10deg); }
    75%  { transform: rotate(28deg); }
    100% { transform: rotate(8deg); }
  }
  @keyframes ft-type {
    0%,100% { transform: rotate(-5deg) scaleY(1.1); }
    50%     { transform: rotate( 4deg) scaleY(1.2); }
  }
</style></defs>

<g transform="rotate(-12, 7.5, 15)">
  <!-- Tips -->
  <g class="ft-type">
    <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
    <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
    <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
    <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
    <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
    <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
    <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
  </g>

  <!-- Legs -->
  <rect x="5"  y="11" width="1" height="2" fill="#DD3D1E"/>
  <rect x="9"  y="11" width="1" height="2" fill="#DD3D1E"/>

  <!-- Body — JS shifts; breathe on child -->
  <g id="body-js">
    <g class="breathe-anim">
      <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
      <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
      <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
      <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
      <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
      <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
      <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
      <!-- Eyes — JS tracks; scan on child -->
      <g id="eyes-js">
        <g class="eyes-read" fill="#330000">
          <rect x="4" y="3" width="2" height="2"/>
          <rect x="9" y="3" width="2" height="2"/>
          <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".60"/>
          <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".60"/>
        </g>
      </g>
      <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
      <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
      <g class="arm-l-type" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
      <g class="arm-r-type" fill="#EE4422"><rect x="13" y="5" width="2" height="2"/></g>
    </g>
  </g>
</g>
</svg>
