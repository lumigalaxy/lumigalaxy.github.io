<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* 2.5s one-shot: look left, raise arm, question mark, return */
  .body-react { transform-origin:7.5px 5px; animation:body-left 2.5s 1 ease-in-out forwards; }
  .eyes-react { animation:eyes-left 2.5s 1 ease-in-out forwards; }
  .eyes-blink { transform-origin:7.5px 4px; animation:blink 3s infinite linear; }
  .arm-l-react { transform-origin:1px 5px; animation:arm-l-left 2.5s 1 ease-in-out forwards; }
  .ft-react { transform-origin:7.5px -1px; animation:ft-left 2.5s 1 ease-in-out forwards; }
  .question { transform-origin:center; animation:qmark-left 2.5s 1 ease-in-out forwards; opacity:0; }

  @keyframes body-left {
    0%,8%    { transform: translate(0,0); }
    16%,56%  { transform: translate(-2px,0) rotate(-2deg); }
    84%,100% { transform: translate(0,0); }
  }
  @keyframes eyes-left {
    0%,8%    { transform: translate(0,0); }
    16%,56%  { transform: translate(-3px,0); }
    84%,100% { transform: translate(0,0); }
  }
  @keyframes arm-l-left {
    0%,8%    { transform: rotate(0deg); }
    16%,56%  { transform: translate(-1px,-2px) rotate(20deg); }
    84%,100% { transform: rotate(0deg); }
  }
  @keyframes ft-left {
    0%,8%    { transform: rotate(0deg) scaleY(1); }
    16%,56%  { transform: rotate(-4deg) scaleY(1.05); }
    84%,100% { transform: rotate(0deg) scaleY(1); }
  }
  @keyframes blink {
    0%,13%,17%,80%,84%,100% { transform: scaleY(1); }
    15%,82%                  { transform: scaleY(0.1); }
  }
  @keyframes qmark-left {
    0%,12%   { opacity:0; transform: translate(-5px,5px) scale(0.5); }
    22%,48%  { opacity:1; transform: translate(-7px,-2px) scale(1); }
    64%,100% { opacity:0; transform: translate(-7px,-7px) scale(1.1); }
  }
</style>
<g id="pixel-question">
  <rect x="1" y="0" width="2" height="1"/>
  <rect x="0" y="1" width="1" height="1"/>
  <rect x="3" y="1" width="1" height="2"/>
  <rect x="2" y="3" width="1" height="1"/>
  <rect x="1" y="4" width="1" height="1"/>
  <rect x="1" y="6" width="1" height="1"/>
</g>
</defs>

<rect x="3" y="14" width="10" height="1" fill="#FF5522" opacity=".45"/>

<!-- Tips -->
<g class="ft-react">
  <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
  <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
  <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
  <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
  <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
  <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
</g>

<!-- Body turns left -->
<g class="body-react">
  <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
  <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
  <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
  <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
  <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
  <rect x="4"  y="9"  width="7" height="1"  fill="#FF7744"/>
  <rect x="5"  y="10" width="5" height="1"  fill="#FF7744"/>
  <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
  <rect x="5"  y="8"  width="5" height="1"  fill="#FFAA66"/>
  <rect x="6"  y="9"  width="3" height="1"  fill="#FFAA66"/>
  <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
  <g class="eyes-react">
    <g class="eyes-blink" fill="#330000">
      <rect x="4" y="3" width="2" height="2"/>
      <rect x="9" y="3" width="2" height="2"/>
      <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
      <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".70"/>
    </g>
  </g>
  <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
  <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".80"/>
  <g class="arm-l-react" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
  <rect fill="#EE4422"                      x="13" y="5" width="2" height="2"/>
</g>

<!-- Question mark (left side) -->
<g class="question" fill="#FF8800">
  <use href="#pixel-question"/>
</g>
</svg>
