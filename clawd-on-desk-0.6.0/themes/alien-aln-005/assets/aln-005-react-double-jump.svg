<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
<defs><style>
  /* Big single jubilant jump after double-click */
  .body-jump { transform-origin:7.5px 13px; animation:big-jump 1.5s 1 ease-in-out forwards; }
  .shadow-jump { transform-origin:7.5px 14px; animation:shadow-jump 1.5s 1 ease-in-out forwards; }
  .arm-l { transform-origin:1px 5px; animation:arm-lj 1.5s 1 ease-in-out forwards; }
  .arm-r { transform-origin:14px 5px; animation:arm-rj 1.5s 1 ease-in-out forwards; }
  .ft-jump { transform-origin:7.5px -1px; animation:ft-jmp 1.5s 1 ease-in-out forwards; }
  .spark { opacity:0; }
  .sp1 { animation:spark-burst 1.5s 1 ease-out forwards; }
  .sp2 { animation:spark-burst 1.5s -0.15s 1 ease-out forwards; fill:#FFCC00; }
  .sp3 { animation:spark-burst 1.5s -0.30s 1 ease-out forwards; fill:#FF6600; }

  @keyframes big-jump {
    0%    { transform: translate(0,0) scale(1,1); }
    15%   { transform: translate(0,0) scale(1.06,0.88); }
    35%   { transform: translate(0,-14px) scale(0.94,1.08); }
    50%   { transform: translate(0,-16px) scale(0.93,1.10); }
    65%   { transform: translate(0,-14px) scale(0.94,1.08); }
    80%   { transform: translate(0,0) scale(1.06,0.88); }
    88%   { transform: translate(0,0) scale(0.98,1.02); }
    100%  { transform: translate(0,0) scale(1,1); }
  }
  @keyframes shadow-jump {
    0%    { transform: scale(1); opacity:.45; }
    15%   { transform: scale(1.12); opacity:.58; }
    35%   { transform: scale(0.45); opacity:.12; }
    50%   { transform: scale(0.40); opacity:.10; }
    65%   { transform: scale(0.45); opacity:.12; }
    80%   { transform: scale(1.12); opacity:.58; }
    88%   { transform: scale(1.02); opacity:.47; }
    100%  { transform: scale(1); opacity:.45; }
  }
  @keyframes arm-lj {
    0%    { transform: rotate(0deg); }
    15%   { transform: rotate(30deg); }
    35%   { transform: rotate(150deg); }
    65%   { transform: rotate(150deg); }
    85%,100%{ transform: rotate(0deg); }
  }
  @keyframes arm-rj {
    0%    { transform: rotate(0deg); }
    15%   { transform: rotate(-30deg); }
    35%   { transform: rotate(-150deg); }
    65%   { transform: rotate(-150deg); }
    85%,100%{ transform: rotate(0deg); }
  }
  @keyframes ft-jmp {
    0%    { transform: rotate(0deg) scaleY(1); }
    15%   { transform: rotate(-6deg) scaleY(0.88); }
    35%   { transform: rotate(0deg) scaleY(1.25); }
    65%   { transform: rotate(0deg) scaleY(1.25); }
    85%,100%{ transform: rotate(0deg) scaleY(1); }
  }
  @keyframes spark-burst {
    0%    { opacity:0; transform:translate(7.5px,0) scale(0); }
    20%   { opacity:1; }
    50%   { opacity:0.8; transform:translate(0,0) scale(1); }
    100%  { opacity:0; transform:translate(0,-6px) scale(1.5); }
  }
</style></defs>

<!-- Shadow -->
<rect class="shadow-jump" x="3" y="14" width="10" height="1" fill="#FF5522" opacity=".45"/>

<!-- Burst sparks at peak -->
<g fill="#FFD700">
  <rect class="spark sp1" x="-4" y="-18" width="2" height="2"/>
  <rect class="spark sp2" x="17" y="-20" width="2" height="2"/>
  <rect class="spark sp3" x=" 7" y="-22" width="2" height="2"/>
</g>

<!-- Full jump body -->
<g class="body-jump">
  <!-- Tips flared -->
  <g class="ft-jump">
    <rect x="7"  y="-6" width="1" height="1" fill="#CC3311"/>
    <rect x="6"  y="-5" width="3" height="2" fill="#CC3311"/>
    <rect x="5"  y="-3" width="5" height="2" fill="#DD4422"/>
    <rect x="3"  y="-4" width="2" height="1" fill="#CC3311"/>
    <rect x="3"  y="-3" width="3" height="2" fill="#DD4422"/>
    <rect x="10" y="-4" width="2" height="1" fill="#CC3311"/>
    <rect x="9"  y="-3" width="3" height="2" fill="#DD4422"/>
  </g>
  <rect x="3"  y="-1" width="9" height="1"  fill="#DD4422"/>
  <rect x="2"  y="0"  width="11" height="9" fill="#EE4422"/>
  <rect x="3"  y="9"  width="9" height="1"  fill="#EE4422"/>
  <rect x="4"  y="10" width="7" height="1"  fill="#EE4422"/>
  <rect x="5"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="9"  y="11" width="1" height="2"  fill="#DD3D1E"/>
  <rect x="3"  y="1"  width="9" height="8"  fill="#FF7744"/>
  <rect x="4"  y="2"  width="7" height="6"  fill="#FFAA66"/>
  <rect x="5"  y="3"  width="5" height="4"  fill="#FFD4A0"/>
  <!-- Excited eyes -->
  <rect x="4" y="3" width="2" height="2" fill="#330000"/>
  <rect x="9" y="3" width="2" height="2" fill="#330000"/>
  <rect x="4" y="3" width="1" height="1" fill="#ffffff" opacity=".90"/>
  <rect x="9" y="3" width="1" height="1" fill="#ffffff" opacity=".90"/>
  <rect x="3"  y="5"  width="2" height="1" fill="#FF9999" opacity=".90"/>
  <rect x="10" y="5"  width="2" height="1" fill="#FF9999" opacity=".90"/>
  <g class="arm-l" fill="#EE4422"><rect x="0"  y="5" width="2" height="2"/></g>
  <g class="arm-r" fill="#EE4422"><rect x="13" y="5" width="2" height="2"/></g>
</g>
</svg>
