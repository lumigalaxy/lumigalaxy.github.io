<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
  <defs>
    <style>
      /* =================================================
         Pixel-art Alien v4
         - Taller teardrop (head + neck + body)
         - Arms on BODY (not head)
         - Refined 8-petal daisy with clear structure
         ================================================= */

      .breathe-anim {
        transform-origin: 7.5px 13.5px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      .action-body {
        transform-origin: 7.5px 13.5px;
        animation: action-body 16s infinite ease-in-out;
      }

      .shadow-anim {
        transform-origin: 7.5px 15px;
        animation: shadow-action 16s infinite ease-in-out;
      }

      .arm-l {
        transform-origin: 5.25px 12px;
        animation: arm-l-idle 16s infinite ease-in-out;
      }
      .arm-r {
        transform-origin: 9.75px 12px;
        animation: arm-r-idle 16s infinite ease-in-out;
      }

      .eyes-look  { animation: eye-track 16s infinite ease-in-out; }
      .eyes-blink {
        transform-origin: 7.5px 8.75px;
        animation: eye-blink 16s infinite linear;
      }
      .highlights-blink {
        transform-origin: 7.5px 7.75px;
        animation: eye-blink 16s infinite linear;
      }

      .flower-sway {
        transform-origin: 7.75px 4.5px;
        animation: flower-sway 4s infinite ease-in-out;
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50%      { transform: scale(1.025, 0.975) translate(0, 0.25px); }
      }

      @keyframes action-body {
        0%, 8%, 26%, 38%, 55%, 80%, 100% { transform: scale(1, 1) translate(0, 0); }
        12%, 22% { transform: translate(0.5px, 0); }
        42%, 50% { transform: translate(-0.5px, 0); }
        30%, 36% { transform: translate(0.25px, 0); }
        60%  { transform: scale(0.96, 1.04) translate(0, -0.5px); }
        65%  { transform: scale(0.92, 1.08) translate(0, -1px); }
        72%  { transform: scale(1.04, 0.96) translate(0, 0.5px); }
        76%  { transform: scale(1, 1)       translate(0, 0); }
      }

      @keyframes shadow-action {
        0%, 8%, 26%, 38%, 55%, 80%, 100% { transform: scaleX(1) translate(0, 0); opacity: 0.5; }
        12%, 22% { transform: scaleX(1) translate(0.5px, 0);  opacity: 0.5; }
        42%, 50% { transform: scaleX(1) translate(-0.5px, 0); opacity: 0.5; }
        30%, 36% { transform: scaleX(1) translate(0.25px, 0); opacity: 0.5; }
        60% { transform: scaleX(0.96) translate(0, 0); opacity: 0.45; }
        65% { transform: scaleX(0.92) translate(0, 0); opacity: 0.40; }
        72% { transform: scaleX(1.04) translate(0, 0); opacity: 0.55; }
        76% { transform: scaleX(1)    translate(0, 0); opacity: 0.50; }
      }

      @keyframes eye-track {
        0%, 10%, 25%, 38%, 52%, 58%, 80%, 100% { transform: translate(0, 0); }
        12%, 22% { transform: translate(0.5px, 0); }
        42%, 50% { transform: translate(-0.5px, 0); }
        60%, 75% { transform: translate(0, -0.3px); }
      }

      @keyframes eye-blink {
        0%, 3%, 7%, 18%, 22%, 43%, 47%, 56%, 83%, 87%, 100% { transform: scaleY(1); }
        5%, 20%, 45%, 85% { transform: scaleY(0.1); }
        60% { transform: scaleY(1); }
        62%, 72% { transform: scaleY(0.1); }
        75% { transform: scaleY(1); }
      }

      /* Tiny hand bobs: no rotation, just small translate */
      @keyframes arm-l-idle {
        0%, 28%, 38%, 58%, 76%, 100% { transform: translate(0, 0); }
        30%, 34% { transform: translate(0, -0.5px); }
        32%, 36% { transform: translate(0, 0); }
        62% { transform: translate(-0.5px, -0.5px); }
        65% { transform: translate(-0.5px, -1px); }
        72% { transform: translate(0, 0.25px); }
      }

      @keyframes arm-r-idle {
        0%, 58%, 76%, 100% { transform: translate(0, 0); }
        62% { transform: translate(0.5px, -0.5px); }
        65% { transform: translate(0.5px, -1px); }
        72% { transform: translate(0, 0.25px); }
      }

      @keyframes flower-sway {
        0%, 100% { transform: rotate(0deg); }
        25%      { transform: rotate(6deg); }
        75%      { transform: rotate(-6deg); }
      }
    </style>
  </defs>

  <!-- Ground Shadow -->
  <rect class="shadow-anim" x="3" y="14.5" width="9" height="0.5" fill="#000000" opacity="0.5"/>

  <g class="action-body">
    <g class="breathe-anim">

      <!-- ============================================================
           Refined Daisy — clear 8-petal structure with cross-shape
           Occupies y=0 to y=2.5 (5 rows on 0.5 grid)
           ============================================================ -->
      <g class="flower-sway">
        <!-- White petals (8 distinct petals, 2 wide on cardinals) -->
        <g fill="#FFFFFF">
          <!-- N petal (2 wide) -->
          <rect x="7"   y="0"   width="0.5" height="0.5"/>
          <rect x="7.5" y="0"   width="0.5" height="0.5"/>
          <!-- NW + NE corner petals -->
          <rect x="6.5" y="0.5" width="0.5" height="0.5"/>
          <rect x="8.5" y="0.5" width="0.5" height="0.5"/>
          <!-- W petal (tall, 3 stacked) -->
          <rect x="6"   y="0.5" width="0.5" height="0.5"/>
          <rect x="6"   y="1"   width="0.5" height="0.5"/>
          <rect x="6"   y="1.5" width="0.5" height="0.5"/>
          <!-- E petal (tall, 3 stacked) -->
          <rect x="9"   y="0.5" width="0.5" height="0.5"/>
          <rect x="9"   y="1"   width="0.5" height="0.5"/>
          <rect x="9"   y="1.5" width="0.5" height="0.5"/>
          <!-- SW + SE corner petals -->
          <rect x="6.5" y="1.5" width="0.5" height="0.5"/>
          <rect x="8.5" y="1.5" width="0.5" height="0.5"/>
          <!-- S petal (2 wide) -->
          <rect x="7"   y="2"   width="0.5" height="0.5"/>
          <rect x="7.5" y="2"   width="0.5" height="0.5"/>
        </g>

        <!-- Light yellow sepals (forms cross around orange center) -->
        <g fill="#FFE870">
          <rect x="7"   y="0.5" width="0.5" height="0.5"/>
          <rect x="7.5" y="0.5" width="0.5" height="0.5"/>
          <rect x="8"   y="0.5" width="0.5" height="0.5"/>
          <rect x="6.5" y="1"   width="0.5" height="0.5"/>
          <rect x="8.5" y="1"   width="0.5" height="0.5"/>
          <rect x="7"   y="1.5" width="0.5" height="0.5"/>
          <rect x="7.5" y="1.5" width="0.5" height="0.5"/>
          <rect x="8"   y="1.5" width="0.5" height="0.5"/>
        </g>
        <!-- Deeper yellow ring -->
        <g fill="#FFC93C">
          <rect x="7"   y="1"   width="0.5" height="0.5"/>
          <rect x="8"   y="1"   width="0.5" height="0.5"/>
        </g>
        <!-- Orange core center -->
        <rect x="7.5" y="1" width="0.5" height="0.5" fill="#E67E22"/>
        <!-- Tiny shine on center -->
        <rect x="7.5" y="1" width="0.25" height="0.25" fill="#FFF176"/>

        <!-- Stem (thin, 2 units tall) -->
        <g fill="#7BA829">
          <rect x="7.5" y="2.5" width="0.5" height="0.5"/>
          <rect x="7.5" y="3"   width="0.5" height="0.5"/>
          <rect x="7.5" y="3.5" width="0.5" height="0.5"/>
          <rect x="7.5" y="4"   width="0.5" height="0.5"/>
          <rect x="7.5" y="4.5" width="0.5" height="0.5"/>
        </g>
      </g>

      <!-- ============================================================
           Plump Teardrop Creature — taller & fuller head
           Head: y=5 to y=11.5 (6.5 units, smoother gradient)
           Body: y=12 to y=13.5 (where tiny hands attach)
           ============================================================ -->
      <g fill="#B8D930">
        <!-- Head top (narrow, stem enters) -->
        <rect x="6.5" y="5"    width="2"  height="0.5"/>
        <rect x="6"   y="5.5"  width="3"  height="0.5"/>
        <rect x="5.5" y="6"    width="4"  height="0.5"/>
        <rect x="5"   y="6.5"  width="5"  height="0.5"/>
        <rect x="4.5" y="7"    width="6"  height="0.5"/>
        <rect x="4"   y="7.5"  width="7"  height="0.5"/>
        <!-- Widest fullest section (y=8 to y=10.5, 2.5 units) -->
        <rect x="3.5" y="8"    width="8"  height="2.5"/>
        <!-- Head narrowing down -->
        <rect x="4"   y="10.5" width="7"  height="0.5"/>
        <rect x="4.5" y="11"   width="6"  height="0.5"/>
        <!-- Neck (shorter, smooth into body) -->
        <rect x="5"   y="11.5" width="5"  height="0.5"/>
        <!-- Body (4 wide, arms attach here) -->
        <rect x="5.5" y="12"   width="4"  height="1.5"/>
      </g>

      <!-- Subtle shadow for depth (body underside only) -->
      <g fill="#8BA82A" opacity="0.45">
        <rect x="5.5" y="13"   width="4"  height="0.5"/>
      </g>

      <!-- ========== Tiny stick hands (longer, higher on body) ========== -->
      <g class="arm-l" fill="#B8D930">
        <rect x="5"   y="12"   width="0.5" height="1.5"/>  <!-- left hand stick -->
      </g>
      <g class="arm-r" fill="#B8D930">
        <rect x="9.5" y="12"   width="0.5" height="1.5"/>  <!-- right hand stick -->
      </g>

      <!-- ========== Legs (4 thin feet) ========== -->
      <g fill="#7BA829">
        <rect id="outer-left-leg"  x="6"   y="13.5" width="0.5" height="1"/>
        <rect id="inner-left-leg"  x="6.5" y="13.5" width="0.5" height="1"/>
        <rect id="inner-right-leg" x="8"   y="13.5" width="0.5" height="1"/>
        <rect id="outer-right-leg" x="8.5" y="13.5" width="0.5" height="1"/>
      </g>

      <!-- ============================================================
           Big Eyes (black) with anime highlights
           Each eye: 2 wide × 2.5 tall
           ============================================================ -->
      <g class="eyes-look">
        <g class="eyes-blink" fill="#000000">
          <rect id="left-eye"  x="4"  y="7.5" width="2" height="2.5"/>
          <rect id="right-eye" x="9"  y="7.5" width="2" height="2.5"/>
        </g>
        <g class="highlights-blink" fill="#FFFFFF">
          <!-- Left eye: top glare + lower dot -->
          <rect x="4"   y="7.5" width="1"   height="0.5"/>
          <rect x="4.5" y="8"   width="0.5" height="0.5"/>
          <rect x="5"   y="9"   width="0.5" height="0.5"/>
          <!-- Right eye: mirrored -->
          <rect x="10"  y="7.5" width="1"   height="0.5"/>
          <rect x="10.5" y="8"  width="0.5" height="0.5"/>
          <rect x="9.5"  y="9"  width="0.5" height="0.5"/>
        </g>
      </g>

    </g>
  </g>
</svg>
