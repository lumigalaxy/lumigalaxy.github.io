<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>Hydrate</title>
  <style>
    :root {
      --alien:        #B8D930;
      --alien-dim:    #8AAB26;
      --alien-glow:   #d8f25c;
      --bg-deep:      #0d130b;
      --bg-strong:    #1f2a17;
      --border:       #B8D930;
      --border-soft:  rgba(184,217,48,0.4);
      --text:         #e8f0d8;
      --text-faint:   #9aa67a;
      --water:        #5cc6ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: transparent;
      font-family: "SFMono-Regular", "Menlo", "Consolas", monospace;
      font-size: 12px;
      color: var(--text);
      overflow: hidden;
      user-select: none;
    }

    .wrap {
      position: absolute;
      inset: 0;
      padding: 4px 4px 14px 4px;
      display: flex;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-deep);
      border: 2px solid var(--border);
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,0.6),
        4px 4px 0 0 rgba(0,0,0,0.55);
      overflow: hidden;
    }

    .header {
      flex: 0 0 auto;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px 0 8px;
      background: var(--bg-strong);
      border-bottom: 2px solid var(--border);
      letter-spacing: 1.5px;
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      color: var(--alien);
    }
    .header .left { display: flex; align-items: center; gap: 6px; }
    .header .drop { color: var(--water); font-size: 13px; }
    .header button {
      width: 18px; height: 18px;
      background: transparent;
      border: 1px solid var(--border-soft);
      color: var(--alien);
      font-size: 10px;
      cursor: pointer;
      padding: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .header button:hover {
      background: var(--alien);
      color: var(--bg-deep);
    }

    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 12px;
      text-align: center;
    }
    .body .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--alien);
      text-transform: uppercase;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .body .subtitle {
      font-size: 10.5px;
      color: var(--text-faint);
      letter-spacing: 0.5px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }

    .actions {
      flex: 0 0 auto;
      display: flex;
      gap: 6px;
      padding: 6px;
      background: var(--bg-strong);
      border-top: 2px solid var(--border);
    }
    .actions button {
      flex: 1;
      height: 26px;
      font-family: inherit;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      border-radius: 0;
      border: 1px solid var(--alien);
      transition: background 0.12s;
    }
    .actions button.primary {
      background: var(--alien);
      color: var(--bg-deep);
    }
    .actions button.primary:hover { background: var(--alien-glow); }
    .actions button.secondary {
      background: transparent;
      color: var(--alien);
      border-color: var(--border-soft);
    }
    .actions button.secondary:hover { background: rgba(184,217,48,0.12); }

    .tail {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 14px;
      pointer-events: none;
    }
    .tail svg { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="header">
        <div class="left">
          <span class="drop">💧</span>
          <span id="head-title">HYDRATE</span>
        </div>
        <button id="btn-close" title="Close">×</button>
      </div>
      <div class="body">
        <div class="title" id="msg-main">TIME FOR WATER</div>
        <div class="subtitle" id="msg-sub">Take a sip — your alien insists.</div>
      </div>
      <div class="actions">
        <button class="primary" id="btn-done" type="button">✓ DONE</button>
        <button class="secondary" id="btn-snooze" type="button">⏱ +5 MIN</button>
      </div>
    </div>
  </div>

  <div class="tail" id="tail">
    <svg viewBox="0 0 18 14" preserveAspectRatio="none">
      <polygon points="0,0 18,0 9,14" fill="#0d130b" stroke="#B8D930" stroke-width="1.2" stroke-linejoin="miter" />
      <rect x="1" y="-1" width="16" height="2" fill="#0d130b"/>
    </svg>
  </div>

<script>
(function () {
  const api = window.waterBubbleAPI;
  const btnDone = document.getElementById("btn-done");
  const btnSnooze = document.getElementById("btn-snooze");
  const btnClose = document.getElementById("btn-close");
  const tailEl = document.getElementById("tail");
  const headTitle = document.getElementById("head-title");
  const msgMain = document.getElementById("msg-main");
  const msgSub = document.getElementById("msg-sub");

  const I18N = {
    en: { head: "HYDRATE", main: "TIME FOR WATER", sub: "Take a sip — your alien insists.", done: "✓ DONE", snooze: (n) => `⏱ +${n} MIN` },
    zh: { head: "喝水啦",  main: "该喝水了",       sub: "外星人提醒你补水。",                done: "✓ 已喝水", snooze: (n) => `⏱ +${n} 分钟` },
    es: { head: "AGUA",    main: "HORA DEL AGUA",  sub: "Bebe un sorbo — el alien insiste.", done: "✓ HECHO",  snooze: (n) => `⏱ +${n} MIN` },
  };

  api.onBootstrap(({ lang, snoozeMinutes }) => {
    const t = I18N[lang] || I18N.en;
    headTitle.textContent = t.head;
    msgMain.textContent = t.main;
    msgSub.textContent = t.sub;
    btnDone.textContent = t.done;
    btnSnooze.textContent = t.snooze(snoozeMinutes || 5);
  });

  api.onTailAnchor(({ tailX }) => {
    tailEl.style.left = tailX + "px";
    tailEl.style.transform = "translateX(-50%)";
  });

  btnDone.addEventListener("click", () => api.action("done"));
  btnSnooze.addEventListener("click", () => api.action("snooze"));
  btnClose.addEventListener("click", () => api.action("close"));

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") api.action("close");
    else if (e.key === "Enter") api.action("done");
  });
})();
</script>
</body>
</html>
