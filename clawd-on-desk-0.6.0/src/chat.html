<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src http://localhost:* http://127.0.0.1:*; img-src 'self' data:;" />
  <title>Chat with Alien</title>
  <style>
    :root {
      --bg: #0d130b;
      --bg-chrome: #161e10;
      --panel: #10180d;
      --panel-alt: #1f2a17;
      --border: #b8d930;
      --border-soft: rgba(184, 217, 48, 0.35);
      --text: #e8f0d8;
      --text-dim: #9aa67a;
      --accent: #b8d930;
      --accent-dim: #8aab26;
      --accent-glow: #d8f25c;
      --user: #243515;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      font-family: "SFMono-Regular", "Menlo", "Consolas", "DejaVu Sans Mono", monospace;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    body { display: flex; flex-direction: column; }

    header {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: var(--bg-chrome);
      border-bottom: 2px solid var(--border);
      gap: 10px;
      -webkit-app-region: drag;
      user-select: none;
    }
    header .title {
      flex: 1;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1.5px;
      color: var(--accent);
      text-transform: uppercase;
    }
    header .title::before {
      content: "🛸";
      margin-right: 6px;
    }
    header .controls {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }
    header select, header button {
      -webkit-app-region: no-drag;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border-soft);
      border-radius: 0;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    header select:hover, header button:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }
    header button.danger { color: var(--danger); border-color: var(--border); }
    header button.danger:hover { background: #3a2027; border-color: var(--danger); }

    #status {
      padding: 6px 14px;
      font-size: 11px;
      color: var(--text-dim);
      background: var(--bg-chrome);
      border-bottom: 2px solid var(--border);
      min-height: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #status .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 0;
      background: var(--text-dim);
    }
    #status.ok .dot { background: var(--accent); }
    #status.err .dot { background: var(--danger); }
    #status.thinking .dot { background: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background:
        linear-gradient(var(--bg), var(--bg)),
        repeating-linear-gradient(0deg, rgba(184,217,48,0.025) 0 1px, transparent 1px 4px);
    }
    #messages::-webkit-scrollbar { width: 10px; }
    #messages::-webkit-scrollbar-track { background: var(--bg); }
    #messages::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 0; }

    .msg {
      display: flex;
      gap: 10px;
      animation: slide-in 0.2s ease-out;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg .avatar {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: var(--panel);
      border: 1px solid var(--border-soft);
    }
    .msg.user .avatar { background: var(--user); color: var(--accent); font-weight: 700; font-size: 13px; }
    .msg.user .avatar::after { content: "Y"; }
    .msg.assistant .avatar::after { content: "🛸"; }
    .msg .body {
      flex: 1;
      min-width: 0;
    }
    .msg .name {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 3px;
    }
    .msg .content {
      line-height: 1.55;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg.assistant .content::after {
      content: "▊";
      color: var(--accent);
      margin-left: 2px;
      animation: blink-caret 1s steps(2) infinite;
      display: none;
    }
    .msg.assistant.streaming .content::after { display: inline; }
    @keyframes blink-caret { 50% { opacity: 0; } }

    .welcome {
      text-align: center;
      color: var(--text-dim);
      padding: 40px 20px;
      font-size: 13px;
      line-height: 1.6;
    }
    .welcome .big {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .welcome .hint {
      margin-top: 14px;
      font-size: 11px;
      opacity: 0.6;
    }
    .welcome code {
      background: var(--panel);
      padding: 2px 6px;
      border-radius: 0;
      color: var(--accent);
      font-size: 11px;
    }

    #composer {
      display: flex;
      gap: 8px;
      padding: 12px 14px;
      background: var(--bg-chrome);
      border-top: 2px solid var(--border);
    }
    #input {
      flex: 1;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border-soft);
      border-radius: 0;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 40px;
      max-height: 180px;
      line-height: 1.45;
    }
    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-dim); }
    #send {
      background: var(--accent);
      color: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 0;
      padding: 0 16px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      min-width: 64px;
      font-family: inherit;
    }
    #send:hover:not(:disabled) { background: var(--accent-glow); color: var(--bg); }
    #send:disabled { background: var(--panel-alt); color: #6c7757; cursor: not-allowed; }
    #send.stop { background: var(--danger); color: white; }
    #send.stop:hover { background: #c0392b; }
  </style>
</head>
<body>
  <header>
    <div class="title">Alien Chat</div>
    <div class="controls">
      <select id="model-select" title="Select model">
        <option>Loading…</option>
      </select>
      <button id="clear-btn" class="danger" title="Clear conversation">Clear</button>
    </div>
  </header>

  <div id="status"><span class="dot"></span><span id="status-text">Connecting to Ollama…</span></div>

  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="big">🛸</div>
      <div>Hi, I'm your Alien. Talk to me!</div>
      <div class="hint">
        Uses local Ollama when available.<br>
        Falls back to Alien local mode automatically.
      </div>
    </div>
  </div>

  <div id="composer">
    <textarea id="input" placeholder="Type a message… (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
    <button id="send">Send</button>
  </div>

  <script src="chat-renderer.js"></script>
</body>
</html>
